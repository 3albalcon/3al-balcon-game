<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>أدخل جوابك — 3AL BALCON</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --tc: #00EFFF; }
body { font-family:'Cairo',sans-serif; color:#fff; min-height:100dvh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px 20px; gap:18px; background:#060d1f; background-size:cover; background-position:center; }
.overlay { position:fixed; inset:0; background:rgba(6,13,31,0.83); z-index:0; }
.content { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:18px; width:100%; max-width:380px; }
.logo { font-size:10px; color:rgba(255,255,255,0.2); letter-spacing:3px; }
.badge { padding:10px 32px; border-radius:100px; font-size:20px; font-weight:900; border:2px solid var(--tc); color:var(--tc); background:rgba(0,0,0,0.4); text-align:center; box-shadow:0 0 20px color-mix(in srgb,var(--tc) 35%,transparent); }
.q-box { background:rgba(0,0,0,0.5); border:2px solid rgba(255,255,255,0.15); border-radius:14px; padding:16px; font-size:18px; font-weight:700; text-align:center; line-height:1.5; width:100%; direction:rtl; }
.waiting { font-size:15px; color:rgba(255,255,255,0.4); text-align:center; animation:pulse 2s infinite; }
.ans-input { width:100%; padding:18px; font-family:'Cairo',sans-serif; font-size:36px; font-weight:900; text-align:center; border-radius:14px; border:2px solid var(--tc); background:rgba(0,0,0,0.5); color:#fff; outline:none; }
.submit-btn { width:100%; padding:18px; border-radius:14px; font-family:'Cairo',sans-serif; font-size:20px; font-weight:900; cursor:pointer; border:2px solid #39FF14; color:#39FF14; background:rgba(57,255,20,0.08); }
.submit-btn:active { background:rgba(57,255,20,0.2); transform:scale(0.97); }
.done-card { display:flex; flex-direction:column; align-items:center; gap:10px; padding:24px; border-radius:16px; background:rgba(57,255,20,0.06); border:2px solid #39FF14; width:100%; text-align:center; }
.done-icon { font-size:52px; }
.done-title { font-size:22px; font-weight:900; color:#39FF14; }
.done-msg { font-size:14px; color:rgba(255,255,255,0.45); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
</style>
</head>
<body>
<div class="overlay"></div>
<div class="content">
  <div class="logo">3AL BALCON</div>
  <div class="badge" id="team-badge">جاري التحميل...</div>
  <div class="waiting" id="state-waiting">⏳ انتظر بدء السؤال من المقدّم...</div>
  <div id="q-box" class="q-box" style="display:none"></div>
  <div id="input-section" style="display:none;flex-direction:column;gap:12px;width:100%">
    <input type="number" class="ans-input" id="ans-input" placeholder="أدخل رقمك" inputmode="numeric">
    <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">✅ إرسال الجواب</button>
  </div>
  <div id="done-section" style="display:none">
    <div class="done-card">
      <div class="done-icon">✅</div>
      <div class="done-title">تم إرسال جوابك!</div>
      <div class="done-msg" id="done-msg">في انتظار الفريق الآخر...</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const cfg = {
  apiKey:"AIzaSyAY-zBQnRPTZLUDMCbod-NFkmuIG4W0XxE",
  authDomain:"al-balcon.firebaseapp.com",
  databaseURL:"https://al-balcon-default-rtdb.firebaseio.com",
  projectId:"al-balcon",
  storageBucket:"al-balcon.firebasestorage.app",
  messagingSenderId:"556294454945",
  appId:"1:556294454945:web:770c330e71a4e484277ae0"
};
const app = initializeApp(cfg);
const db = getDatabase(app);

const p = new URLSearchParams(location.search);
const roomId = p.get('r');
const team = p.get('t');       // 'a' or 'b'
const session = p.get('s') || 'main';
const isA = team === 'a';

// Set team color
document.documentElement.style.setProperty('--tc', isA ? '#E50158' : '#E2DA51');

// Load wallpaper from room data
let _wallSet = false;
function applyWallpaper(url) {
  if (!url || _wallSet) return;
  _wallSet = true;
  document.body.style.backgroundImage = `url('${url}')`;
}

let submitted = false;
let roomData = {};

if (!roomId || !team) {
  document.getElementById('team-badge').textContent = 'رابط غير صحيح';
} else {
  // Mark connected
  update(ref(db, `closest/${roomId}`), { [`connected${isA?'A':'B'}`]: true });

  onValue(ref(db, `closest/${roomId}`), snap => {
    const d = snap.val(); if (!d) return;
    roomData = d;

    // Apply wallpaper
    if (d.wallpaper) applyWallpaper(d.wallpaper);

    // Team name
    const name = isA ? d.teamA : d.teamB;
    document.getElementById('team-badge').textContent = name || (isA ? 'الفريق أ' : 'الفريق ب');

    // Reset for new question if phase goes back to waiting
    if (d.phase === 'waiting' && submitted) {
      submitted = false;
      document.getElementById('done-section').style.display = 'none';
      document.getElementById('state-waiting').style.display = 'block';
      document.getElementById('input-section').style.display = 'none';
      document.getElementById('q-box').style.display = 'none';
      document.getElementById('ans-input').value = '';
      document.getElementById('submit-btn').disabled = false;
    }

    // Phase active → show question + input
    if (d.phase === 'active' && !submitted) {
      document.getElementById('state-waiting').style.display = 'none';
      if (d.question) {
        document.getElementById('q-box').textContent = d.question;
        document.getElementById('q-box').style.display = 'block';
      }
      document.getElementById('input-section').style.display = 'flex';
    }

    // Update done message
    if (submitted) {
      const other = isA ? d.answerB : d.answerA;
      const doneMsg = document.getElementById('done-msg');
      if (doneMsg) {
        doneMsg.textContent = (other !== null && other !== undefined)
          ? '✅ كلا الفريقين أرسلا أجوبتهم!'
          : 'في انتظار الفريق الآخر...';
      }
    }
  });
}

window.submitAnswer = async () => {
  const val = document.getElementById('ans-input').value.trim();
  if (!val || submitted) return;
  document.getElementById('submit-btn').disabled = true;
  submitted = true;
  await update(ref(db, `closest/${roomId}`), {
    [`answer${isA?'A':'B'}`]: parseFloat(val),
    [`answeredAt${isA?'A':'B'}`]: Date.now()
  });
  document.getElementById('input-section').style.display = 'none';
  document.getElementById('q-box').style.display = 'none';
  document.getElementById('done-section').style.display = 'block';
  // Check if other already answered
  const other = isA ? roomData?.answerB : roomData?.answerA;
  const doneMsg = document.getElementById('done-msg');
  if (doneMsg) {
    doneMsg.textContent = (other !== null && other !== undefined)
      ? '✅ كلا الفريقين أرسلا أجوبتهم!'
      : 'في انتظار الفريق الآخر...';
  }
};
</script>
</body>
</html>
