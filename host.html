<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Host Remote — 3AL BALCON</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --dark:#060d1f; --yellow:#FFE600; --green:#39FF14; --cyan:#00EFFF; --red:#FF2D2D; }

body {
  font-family:'Cairo',sans-serif;
  background:var(--dark);
  /* wallpaper set dynamically */
  background-size:cover; background-position:center; background-attachment:fixed;
  color:#fff; min-height:100dvh;
  display:flex; flex-direction:column;
  overflow:hidden;
}

/* Overlay to dim wallpaper */
.overlay {
  position:fixed; inset:0;
  background:rgba(6,13,31,0.82);
  z-index:0;
}

/* All content above overlay */
.content {
  position:relative; z-index:1;
  flex:1; display:flex; flex-direction:column;
  padding:10px 12px 0;
  min-height:100dvh;
}

.logo { font-size:10px; color:rgba(255,255,255,0.2); letter-spacing:3px; text-align:center; margin-bottom:2px; }

/* Scrollable middle */
.scroll-area {
  flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px;
  padding-bottom:8px;
}

/* Fixed bottom controls */
.bottom-bar {
  background:rgba(6,13,31,0.9);
  border-top:1px solid rgba(255,255,255,0.1);
  padding:10px 0 max(12px,env(safe-area-inset-bottom));
  display:flex; flex-direction:column; gap:8px;
  flex-shrink:0;
}

/* Status */
.status-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:9px 14px; border-radius:12px;
  background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.12);
}
.status-cat { font-weight:900; color:var(--cyan); font-size:13px; }
.status-q { color:rgba(255,255,255,0.4); font-size:11px; }

/* Score */
.score-bar {
  display:flex; gap:8px; align-items:center;
  padding:8px 14px; border-radius:12px;
  background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.08);
}
.score-team { flex:1; display:flex; flex-direction:column; align-items:center; }
.score-name { font-size:11px; font-weight:700; }
.score-pts { font-size:26px; font-weight:900; line-height:1; }

/* Q&A */
.q-box {
  background:rgba(0,239,255,0.08); border:2px solid var(--cyan);
  border-radius:12px; padding:14px;
  font-size:17px; font-weight:700; text-align:center; line-height:1.5; direction:rtl;
}
.a-box {
  background:rgba(57,255,20,0.08); border:2px solid var(--green);
  border-radius:12px; padding:12px;
  font-size:22px; font-weight:900; text-align:center;
  color:var(--green); text-shadow:0 0 12px rgba(57,255,20,0.5); direction:rtl;
}
.a-hidden {
  background:rgba(255,255,255,0.04); border:2px dashed rgba(255,255,255,0.2);
  border-radius:12px; padding:12px;
  font-size:14px; font-weight:700; text-align:center; color:rgba(255,255,255,0.35);
  cursor:pointer;
}
.a-hidden:active { background:rgba(255,255,255,0.08); }
.waiting { font-size:14px; color:rgba(255,255,255,0.3); text-align:center; animation:pulse 2s infinite; padding:16px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.section-label { font-size:10px; color:rgba(255,255,255,0.25); letter-spacing:2px; text-align:center; }

/* Cat 3 bid display */
.bid-row { display:flex; gap:8px; justify-content:center; }
.bid-card {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:10px 8px; border-radius:12px;
}
.bid-card-a { background:rgba(229,1,88,0.1); border:1.5px solid #E50158; }
.bid-card-b { background:rgba(226,218,81,0.1); border:1.5px solid #E2DA51; }
.bid-n { font-size:11px; font-weight:700; }
.bid-v { font-size:40px; font-weight:900; line-height:1; }

/* Answers list */
.ans-chip {
  padding:8px 12px; border-radius:8px; font-size:13px; font-weight:700;
  display:flex; align-items:center; gap:6px;
}
.chip-p { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.6); }
.chip-ok { background:rgba(57,255,20,0.08); border:1px solid var(--green); color:var(--green); }
.chip-no { background:rgba(255,45,45,0.08); border:1px solid var(--red); color:var(--red); }

/* Category selector */
.cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.cat-btn {
  padding:11px 8px; border-radius:10px;
  border:1.5px solid rgba(255,255,255,0.12);
  background:rgba(0,0,0,0.3);
  color:rgba(255,255,255,0.65);
  font-family:'Cairo',sans-serif; font-size:11px; font-weight:700;
  cursor:pointer; text-align:center; line-height:1.4; transition:all 0.2s;
}
.cat-btn:active { transform:scale(0.94); }
.cat-btn.done { opacity:0.2; cursor:not-allowed; text-decoration:line-through; }
.cat-btn.current { border-color:var(--yellow); color:var(--yellow); background:rgba(255,230,0,0.08); }

/* Bottom control buttons */
.btn-row { display:flex; gap:7px; }
.cbtn {
  flex:1; padding:13px 0; border-radius:12px;
  font-family:'Cairo',sans-serif; font-size:14px; font-weight:900;
  cursor:pointer; border:2px solid; transition:all 0.15s; text-align:center;
}
.cbtn:active { transform:scale(0.94); }
.cbtn:disabled { opacity:0.2; cursor:default; transform:none; }
.cbtn-g { border-color:var(--green); color:var(--green); background:rgba(57,255,20,0.07); }
.cbtn-c { border-color:var(--cyan); color:var(--cyan); background:rgba(0,239,255,0.07); }
.cbtn-y { border-color:var(--yellow); color:var(--yellow); background:rgba(255,230,0,0.07); }
.cbtn-w { border-color:rgba(255,255,255,0.2); color:rgba(255,255,255,0.5); background:rgba(255,255,255,0.04); }
.cbtn-sm { font-size:12px; padding:10px 0; }
</style>
</head>
<body>
<div class="overlay"></div>
<div class="content">
  <div class="logo">🎙 HOST REMOTE — 3AL BALCON</div>

  <!-- Scrollable area -->
  <div class="scroll-area" id="scroll-area">

    <!-- Status -->
    <div class="status-bar">
      <span class="status-cat" id="status-cat">القائمة الرئيسية</span>
      <span class="status-q" id="status-q"></span>
    </div>

    <!-- Score -->
    <div class="score-bar">
      <div class="score-team">
        <div class="score-name" id="sc-na" style="color:#E50158">الفريق أ</div>
        <div class="score-pts" id="sc-a" style="color:#E50158">0</div>
      </div>
      <div style="font-size:16px;color:rgba(255,255,255,0.2);font-weight:900">VS</div>
      <div class="score-team">
        <div class="score-name" id="sc-nb" style="color:#E2DA51">الفريق ب</div>
        <div class="score-pts" id="sc-b" style="color:#E2DA51">0</div>
      </div>
    </div>

    <!-- Main content area — changes based on game state -->
    <div id="main-content">
      <div class="waiting" id="waiting-msg">انتظر بدء اللعبة...</div>
    </div>

    <!-- Category selector -->
    <div id="cat-section" style="display:flex;flex-direction:column;gap:8px">
      <div class="section-label">— اختر فقرة —</div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>

    <!-- Roulette panel — shown when 🎰 tapped -->
    <div id="roulette-panel" style="display:none;flex-direction:column;gap:10px;align-items:center">
      <div class="section-label">— شو بدنا نختار —</div>
      <!-- Roulette strip -->
      <div style="width:100%;height:120px;background:rgba(0,0,0,0.4);border:2px solid var(--yellow);border-radius:14px;overflow:hidden;position:relative">
        <div style="position:absolute;top:50%;left:0;right:0;height:2px;background:var(--yellow);transform:translateY(-50%);z-index:2;box-shadow:0 0 8px var(--yellow)"></div>
        <div id="host-roulette-strip" style="display:flex;flex-direction:column;align-items:center;gap:0;transition:transform 0.05s linear;padding:40px 0"></div>
      </div>
      <div id="host-roulette-result" style="font-size:16px;font-weight:900;color:var(--yellow);text-align:center;min-height:20px"></div>
      <div style="display:flex;gap:8px;width:100%">
        <button class="cbtn cbtn-y" onclick="hostSpin()" id="host-spin-btn">🎰 دوّر!</button>
        <button class="cbtn cbtn-g" id="host-go-btn" style="display:none" onclick="hostGoRoulette()">← ابدأ!</button>
      </div>
      <button class="cbtn cbtn-w cbtn-sm" onclick="closeRoulette()" style="width:100%">✕ إغلاق</button>
    </div>

  </div><!-- end scroll-area -->

  <!-- Fixed bottom controls -->
  <div class="bottom-bar">
    <div class="btn-row">
      <button class="cbtn cbtn-c" id="btn-prev" onclick="sendCmd('prev')" disabled>← السابق</button>
      <button class="cbtn cbtn-g" id="btn-next" onclick="sendCmd('next')" disabled>التالي →</button>
    </div>
    <div class="btn-row">
      <button class="cbtn cbtn-w cbtn-sm" onclick="sendCmd('menu')">🏠 القائمة</button>
      <button class="cbtn cbtn-y cbtn-sm" id="btn-reveal" onclick="revealAnswer()" style="display:none">👁 الجواب</button>
      <button class="cbtn cbtn-y cbtn-sm" onclick="sendCmd('result')">🏆 النتيجة</button>
    </div>
    <div class="btn-row">
      <button class="cbtn cbtn-sm" onclick="openRoulettePanel()" style="border-color:var(--red);color:var(--red);background:rgba(255,45,120,0.07);font-size:13px">🎰 شو بدنا نختار</button>
    </div>
  </div>

</div><!-- end content -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const cfg = {
  apiKey:"AIzaSyAY-zBQnRPTZLUDMCbod-NFkmuIG4W0XxE",
  authDomain:"al-balcon.firebaseapp.com",
  databaseURL:"https://al-balcon-default-rtdb.firebaseio.com",
  projectId:"al-balcon",
  storageBucket:"al-balcon.firebasestorage.app",
  messagingSenderId:"556294454945",
  appId:"1:556294454945:web:770c330e71a4e484277ae0"
};
const app = initializeApp(cfg);
const db = getDatabase(app);

const ROUNDS = [
  { id:'r1',  num:1,  name:'وين شايفو هالوجه؟' },
  { id:'r2',  num:2,  name:'ما تذكرتني بعد؟' },
  { id:'r3',  num:3,  name:'مزاد علني' },
  { id:'r10', num:4,  name:'متفرقات سريعة' },
  { id:'r4',  num:5,  name:'سمعني الدندنة' },
  { id:'r5',  num:6,  name:'سكوت و ركز' },
  { id:'r6',  num:7,  name:'يا حبيبي قرب ليي' },
  { id:'r7',  num:8,  name:'يا قريب يا غريب' },
  { id:'r8',  num:9,  name:'سكر تمك' },
  { id:'r9',  num:10, name:'من كل وادي عصا' },
];

// Categories with no answer reveal (image/charades show answer same as question)
const NO_REVEAL = ['r3','r5','r8'];
// Categories with separate answer reveal
const HAS_REVEAL = ['r1','r2','r4','r6','r7','r9','r10'];

let currentState = {};
let answerVisible = false;
let currentAnswer = '';

window.sendCmd = (cmd, data={}) => {
  set(ref(db,'hostCmd'), { cmd, data, ts:Date.now() });
};

window.revealAnswer = () => {
  answerVisible = !answerVisible;
  const aBox = document.getElementById('answer-area');
  const btn = document.getElementById('btn-reveal');
  if (aBox) {
    if (answerVisible) {
      aBox.innerHTML = `<div class="a-box">${currentAnswer}</div>`;
      if (btn) btn.textContent = '🙈 اخفِ الجواب';
    } else {
      aBox.innerHTML = `<div class="a-hidden" onclick="revealAnswer()">👁 اضغط لكشف الجواب</div>`;
      if (btn) btn.textContent = '👁 الجواب';
    }
  }
};

function buildMainContent(hostView, hostState, cat3Data) {
  const mc = document.getElementById('main-content');
  const waiting = document.getElementById('waiting-msg');
  const catSection = document.getElementById('cat-section');
  const revealBtn = document.getElementById('btn-reveal');

  // No active category
  if (!hostState?.currentRound || hostState.currentRound === null) {
    waiting.style.display = 'block';
    waiting.textContent = 'القائمة الرئيسية — اختر فقرة من الأسفل';
    mc.innerHTML = '';
    catSection.style.display = 'flex';
    revealBtn.style.display = 'none';
    document.getElementById('btn-next').disabled = true;
    document.getElementById('btn-prev').disabled = true;
    return;
  }

  waiting.style.display = 'none';
  catSection.style.display = 'flex'; // always show category grid

  const rid = hostState.currentRound;
  const round = ROUNDS.find(r=>r.id===rid);
  const qNum = (hostState.currentQ||0) + 1;

  // Title slide
  if (hostState.currentQ === -1) {
    mc.innerHTML = `<div class="q-box" style="font-size:20px;color:var(--yellow)">${round?.name||''}</div>`;
    revealBtn.style.display = 'none';
    document.getElementById('btn-next').disabled = false;
    document.getElementById('btn-prev').disabled = true;
    return;
  }

  document.getElementById('btn-next').disabled = false;
  document.getElementById('btn-prev').disabled = (hostState.currentQ||0) <= 0;

  // Cat 3 — show bids and answers
  if (rid === 'r3') {
    revealBtn.style.display = 'none';
    if (!cat3Data) { mc.innerHTML = '<div class="waiting">انتظر بدء المزاد...</div>'; return; }
    const bids = cat3Data.bids || {};
    const answers = cat3Data.answers || [];
    const wName = cat3Data.auctionWinner === 'a' ? cat3Data.teamA : cat3Data.auctionWinner === 'b' ? cat3Data.teamB : null;
    mc.innerHTML = `
      <div class="q-box">${cat3Data.question||''}</div>
      <div class="bid-row">
        <div class="bid-card bid-card-a">
          <div class="bid-n" style="color:#E50158">${cat3Data.teamA||'أ'}</div>
          <div class="bid-v" style="color:#E50158">${bids.a?.value||'—'}</div>
        </div>
        <div style="font-size:14px;color:rgba(255,255,255,0.2)">VS</div>
        <div class="bid-card bid-card-b">
          <div class="bid-n" style="color:#E2DA51">${cat3Data.teamB||'ب'}</div>
          <div class="bid-v" style="color:#E2DA51">${bids.b?.value||'—'}</div>
        </div>
      </div>
      ${wName ? `<div style="font-size:13px;font-weight:700;color:var(--green);text-align:center">🏆 ${wName} — ${cat3Data.winningBid} أجوبة</div>` : ''}
      ${answers.length ? `<div style="display:flex;flex-direction:column;gap:6px">
        ${answers.map((a,i)=>`<div class="ans-chip chip-${a.status==='correct'?'ok':a.status==='wrong'?'no':'p'}">
          <span>${i+1}.</span><span style="flex:1">${a.text}</span>
          <span>${a.status==='correct'?'✅':a.status==='wrong'?'❌':'⏳'}</span>
        </div>`).join('')}
      </div>` : '<div style="color:rgba(255,255,255,0.25);text-align:center;font-size:12px">لم تُكتب أجوبة بعد</div>'}`;
    return;
  }

  // All other categories — show Q&A
  const q = hostView?.question || '';
  currentAnswer = hostView?.answer || '';
  const hasReveal = HAS_REVEAL.includes(rid) && currentAnswer;

  if (hasReveal) {
    revealBtn.style.display = 'flex';
    answerVisible = false;
  } else {
    revealBtn.style.display = 'none';
    answerVisible = true;
  }

  mc.innerHTML = `
    ${q ? `<div class="q-box">${q}</div>` : ''}
    <div id="answer-area">
      ${hasReveal
        ? `<div class="a-hidden" onclick="revealAnswer()">👁 اضغط لكشف الجواب</div>`
        : currentAnswer ? `<div class="a-box">${currentAnswer}</div>` : ''
      }
    </div>`;
}

// State
let hostViewData = {};
let hostStateData = {};
let cat3Data = null;
let cat3RoomId = null;

function update() {
  const state = hostStateData;
  const round = ROUNDS.find(r=>r.id===state?.currentRound);

  // Status bar
  document.getElementById('status-cat').textContent = round ? `فقرة ${round.num}: ${round.name}` : 'القائمة الرئيسية';
  const q = state?.currentQ;
  document.getElementById('status-q').textContent =
    q === -1 ? 'العنوان' :
    q === 0 ? 'القوانين' :
    q >= 1 ? `سؤال ${q}` : '';

  // Scores
  if (state.teamA) document.getElementById('sc-na').textContent = state.teamA;
  if (state.teamB) document.getElementById('sc-nb').textContent = state.teamB;
  document.getElementById('sc-a').textContent = state.scoreA || 0;
  document.getElementById('sc-b').textContent = state.scoreB || 0;

  // Category grid
  const done = state.done || [];
  document.getElementById('cat-grid').innerHTML = ROUNDS.map(r => `
    <button class="cat-btn ${done.includes(r.id)?'done':''} ${state.currentRound===r.id?'current':''}"
      onclick="${done.includes(r.id)?'void(0)':(`window.sendCmd('openCat',{id:'${r.id}'})`)}"
      ${done.includes(r.id)?'disabled':''}>
      ${r.num}. ${r.name}
    </button>`).join('');

  buildMainContent(hostViewData, state, cat3Data);
}

// Listeners
onValue(ref(db,'hostView'), snap => {
  hostViewData = snap.val() || {};
  update();
});

onValue(ref(db,'hostState'), snap => {
  const d = snap.val() || {};
  hostStateData = d;
  hostRouletteRounds = ROUNDS.filter(r => !(d.done||[]).includes(r.id));

  // Cat3 room changed
  if (d.cat3RoomId && d.cat3RoomId !== cat3RoomId) {
    cat3RoomId = d.cat3RoomId;
    onValue(ref(db,`rooms/${cat3RoomId}`), rSnap => {
      cat3Data = rSnap.val();
      update();
    });
  }
  update();
});

// ── Roulette on host phone ──
let hostRouletteTarget = null;
let hostRouletteRounds = [];
let hostRouletteInterval = null;

window.openRoulettePanel = function() {
  document.getElementById('roulette-panel').style.display = 'flex';
  document.getElementById('cat-section').style.display = 'none';
  document.getElementById('host-roulette-result').textContent = '';
  document.getElementById('host-go-btn').style.display = 'none';
  // Tell main screen to open roulette too
  sendCmd('showRoulette');
};

window.closeRoulette = function() {
  document.getElementById('roulette-panel').style.display = 'none';
  document.getElementById('cat-section').style.display = 'flex';
  clearInterval(hostRouletteInterval);
};

window.hostSpin = function() {
  const done = (hostStateData?.done) || [];
  const remaining = ROUNDS.filter(r => !done.includes(r.id));
  if (!remaining.length) return;

  document.getElementById('host-spin-btn').disabled = true;
  document.getElementById('host-go-btn').style.display = 'none';
  document.getElementById('host-roulette-result').textContent = '';

  const strip = document.getElementById('host-roulette-strip');
  const winner = remaining[Math.floor(Math.random() * remaining.length)];
  hostRouletteTarget = winner;

  // Build items for animation
  const items = [];
  for (let i = 0; i < 30; i++) items.push(remaining[i % remaining.length]);

  let idx = 0;
  let speed = 80;
  let ticks = 0;
  const totalTicks = 40;

  clearInterval(hostRouletteInterval);
  hostRouletteInterval = setInterval(() => {
    ticks++;
    const item = items[idx % items.length];
    strip.innerHTML = `<div style="font-size:15px;font-weight:900;color:var(--yellow);text-align:center;padding:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%">فقرة ${item.num}: ${item.name}</div>`;
    idx++;

    // Slow down near end
    if (ticks > totalTicks * 0.7) speed = Math.min(speed + 15, 400);

    if (ticks >= totalTicks) {
      clearInterval(hostRouletteInterval);
      strip.innerHTML = `<div style="font-size:15px;font-weight:900;color:var(--yellow);text-align:center;padding:8px">فقرة ${winner.num}: ${winner.name}</div>`;
      document.getElementById('host-roulette-result').textContent = `🎯 ${winner.name}`;
      document.getElementById('host-go-btn').style.display = 'flex';
      document.getElementById('host-spin-btn').disabled = false;
      // Tell main screen to spin too
      sendCmd('spinRoulette', { targetId: winner.id });
    }
  }, speed);
};

window.hostGoRoulette = function() {
  if (!hostRouletteTarget) return;
  sendCmd('openCat', { id: hostRouletteTarget.id });
  closeRoulette();
};

// Wallpaper
onValue(ref(db,'hostWallpaper'), snap => {
  const url = snap.val();
  if (url) document.body.style.backgroundImage = `url('${url}')`;
});
</script>
</body>
</html>
