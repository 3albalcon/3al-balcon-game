<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Host Remote — 3AL BALCON</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --dark:#060d1f; --yellow:#FFE600; --green:#39FF14; --cyan:#00EFFF; --red:#FF2D2D; }
body { font-family:'Cairo',sans-serif; background:var(--dark); color:#fff; min-height:100dvh; display:flex; flex-direction:column; padding:12px 14px 32px; gap:10px; overflow-x:hidden; }

.logo { font-size:11px; color:rgba(255,255,255,0.25); letter-spacing:3px; text-align:center; }

/* Tabs */
.tab-bar { display:flex; gap:6px; }
.tab { flex:1; padding:9px 0; border-radius:10px; border:1.5px solid rgba(255,255,255,0.12); background:transparent; color:rgba(255,255,255,0.35); font-family:'Cairo',sans-serif; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.2s; }
.tab.active { border-color:var(--yellow); color:var(--yellow); background:rgba(255,230,0,0.07); }
.panel { display:none; flex-direction:column; gap:10px; }
.panel.active { display:flex; }

/* Status bar */
.status-bar { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-radius:12px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); font-size:13px; }
.status-cat { font-weight:900; color:var(--cyan); }
.status-q { color:rgba(255,255,255,0.5); font-size:12px; }

/* Q&A */
.q-box { background:rgba(0,239,255,0.06); border:2px solid var(--cyan); border-radius:12px; padding:14px; font-size:16px; font-weight:700; text-align:center; line-height:1.5; direction:rtl; }
.a-box { background:rgba(57,255,20,0.06); border:2px solid var(--green); border-radius:12px; padding:12px; font-size:20px; font-weight:900; text-align:center; color:var(--green); text-shadow:0 0 10px rgba(57,255,20,0.4); direction:rtl; }
.waiting { font-size:14px; color:rgba(255,255,255,0.3); text-align:center; animation:pulse 2s infinite; padding:16px; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Control buttons */
.nav-row { display:flex; gap:8px; }
.cbtn { flex:1; padding:14px 0; border-radius:12px; font-family:'Cairo',sans-serif; font-size:15px; font-weight:900; cursor:pointer; border:2px solid; transition:all 0.15s; text-align:center; }
.cbtn:active { transform:scale(0.94); }
.cbtn:disabled { opacity:0.25; cursor:default; transform:none; }
.cbtn-g { border-color:var(--green); color:var(--green); background:rgba(57,255,20,0.07); }
.cbtn-c { border-color:var(--cyan); color:var(--cyan); background:rgba(0,239,255,0.07); }
.cbtn-y { border-color:var(--yellow); color:var(--yellow); background:rgba(255,230,0,0.07); }
.cbtn-r { border-color:rgba(255,255,255,0.2); color:rgba(255,255,255,0.4); background:transparent; font-size:12px; padding:10px 0; }

.divider { font-size:10px; color:rgba(255,255,255,0.2); text-align:center; letter-spacing:2px; padding:2px 0; }

/* Category grid */
.cat-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
.cat-btn { padding:11px 8px; border-radius:10px; border:1.5px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.02); color:rgba(255,255,255,0.65); font-family:'Cairo',sans-serif; font-size:11px; font-weight:700; cursor:pointer; text-align:center; line-height:1.4; transition:all 0.2s; }
.cat-btn:active { transform:scale(0.95); }
.cat-btn.done { opacity:0.25; cursor:not-allowed; text-decoration:line-through; }
.cat-btn.current { border-color:var(--yellow); color:var(--yellow); background:rgba(255,230,0,0.08); box-shadow:0 0 10px rgba(255,230,0,0.15); }

/* Cat 3 */
.bid-row { display:flex; gap:12px; justify-content:center; align-items:center; }
.bid-team { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:12px; border-radius:12px; }
.bid-team-a { background:rgba(229,1,88,0.08); border:1.5px solid #E50158; }
.bid-team-b { background:rgba(226,218,81,0.08); border:1.5px solid #E2DA51; }
.bid-name-t { font-size:12px; font-weight:700; }
.bid-val-t { font-size:42px; font-weight:900; line-height:1; }
.ans-chip { padding:8px 12px; border-radius:8px; font-size:12px; font-weight:700; display:flex; align-items:center; gap:6px; }
.chip-p { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.6); }
.chip-ok { background:rgba(57,255,20,0.08); border:1px solid var(--green); color:var(--green); }
.chip-no { background:rgba(255,45,45,0.08); border:1px solid var(--red); color:var(--red); }
</style>
</head>
<body>

<div class="logo">🎙 HOST REMOTE — 3AL BALCON</div>

<!-- Tabs -->
<div class="tab-bar">
  <button class="tab active" onclick="switchTab('qa')">السؤال</button>
  <button class="tab" onclick="switchTab('ctrl')">التحكم</button>
  <button class="tab" onclick="switchTab('cat3')">المزاد</button>
</div>

<!-- ── Q&A Panel ── -->
<div class="panel active" id="panel-qa">
  <div class="status-bar">
    <span class="status-cat" id="qa-cat">—</span>
    <span class="status-q" id="qa-num"></span>
  </div>
  <div class="waiting" id="qa-wait">انتظر بدء السؤال...</div>
  <div class="q-box" id="qa-q" style="display:none"></div>
  <div style="font-size:10px;color:rgba(255,255,255,0.25);text-align:center;letter-spacing:2px">الجواب الصحيح</div>
  <div class="a-box" id="qa-a" style="display:none"></div>
</div>

<!-- ── Control Panel ── -->
<div class="panel" id="panel-ctrl">
  <!-- Current position -->
  <div class="status-bar">
    <span class="status-cat" id="ctrl-cat">القائمة الرئيسية</span>
    <span class="status-q" id="ctrl-q"></span>
  </div>

  <!-- Navigation -->
  <div class="nav-row">
    <button class="cbtn cbtn-c" id="btn-prev" onclick="sendCmd('prev')">← السابق</button>
    <button class="cbtn cbtn-g" id="btn-next" onclick="sendCmd('next')">التالي →</button>
  </div>
  <div class="nav-row">
    <button class="cbtn cbtn-y" onclick="sendCmd('result')">🏆 النتيجة</button>
    <button class="cbtn cbtn-c" onclick="sendCmd('titleSlide')">📋 العنوان</button>
  </div>
  <button class="cbtn cbtn-r" onclick="sendCmd('menu')" style="width:100%">🏠 القائمة الرئيسية</button>

  <div class="divider">— اختر فقرة —</div>
  <div class="cat-grid" id="cat-grid"></div>
</div>

<!-- ── Cat 3 Panel ── -->
<div class="panel" id="panel-cat3">
  <div class="divider">— المزايدة —</div>
  <div class="bid-row">
    <div class="bid-team bid-team-a">
      <div class="bid-name-t" id="c3-na" style="color:#E50158">الفريق أ</div>
      <div class="bid-val-t" id="c3-ba" style="color:#E50158">—</div>
    </div>
    <div style="font-size:14px;color:rgba(255,255,255,0.2);font-weight:900">VS</div>
    <div class="bid-team bid-team-b">
      <div class="bid-name-t" id="c3-nb" style="color:#E2DA51">الفريق ب</div>
      <div class="bid-val-t" id="c3-bb" style="color:#E2DA51">—</div>
    </div>
  </div>
  <div id="c3-winner" style="font-size:13px;font-weight:700;color:var(--green);text-align:center;display:none"></div>
  <div class="divider">— الأجوبة —</div>
  <div id="c3-answers" style="display:flex;flex-direction:column;gap:6px">
    <div style="color:rgba(255,255,255,0.25);text-align:center;font-size:12px">لم تُكتب أجوبة بعد</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const cfg = {
  apiKey:"AIzaSyAY-zBQnRPTZLUDMCbod-NFkmuIG4W0XxE",
  authDomain:"al-balcon.firebaseapp.com",
  databaseURL:"https://al-balcon-default-rtdb.firebaseio.com",
  projectId:"al-balcon",
  storageBucket:"al-balcon.firebasestorage.app",
  messagingSenderId:"556294454945",
  appId:"1:556294454945:web:770c330e71a4e484277ae0"
};
const app = initializeApp(cfg);
const db = getDatabase(app);

const ROUNDS = [
  { id:'r1',  num:1,  name:'وين شايفو هالوجه؟' },
  { id:'r2',  num:2,  name:'ما تذكرتني بعد؟' },
  { id:'r3',  num:3,  name:'مزاد علني' },
  { id:'r10', num:4,  name:'متفرقات سريعة' },
  { id:'r4',  num:5,  name:'سمعني الدندنة' },
  { id:'r5',  num:6,  name:'سكوت و ركز' },
  { id:'r6',  num:7,  name:'يا حبيبي قرب ليي' },
  { id:'r7',  num:8,  name:'يا قريب يا غريب' },
  { id:'r8',  num:9,  name:'سكر تمك' },
  { id:'r9',  num:10, name:'من كل وادي عصا' },
];

window.switchTab = (tab) => {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['qa','ctrl','cat3'][i]===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
};

window.sendCmd = (cmd, data={}) => {
  set(ref(db,'hostCmd'), { cmd, data, ts:Date.now() });
  // Flash feedback
  const map = { next:'btn-next', prev:'btn-prev' };
  if (map[cmd]) {
    const btn = document.getElementById(map[cmd]);
    if (btn) { btn.style.background='rgba(57,255,20,0.3)'; setTimeout(()=>btn.style.background='',300); }
  }
};

// Q&A panel
onValue(ref(db,'hostView'), snap => {
  const d = snap.val();
  const wait = document.getElementById('qa-wait');
  const qEl = document.getElementById('qa-q');
  const aEl = document.getElementById('qa-a');
  if (!d || !d.active || !d.question) {
    wait.style.display='block'; qEl.style.display='none'; aEl.style.display='none';
    document.getElementById('qa-cat').textContent='—';
    document.getElementById('qa-num').textContent='';
    return;
  }
  wait.style.display='none';
  document.getElementById('qa-cat').textContent = d.categoryName||'';
  document.getElementById('qa-num').textContent = d.questionNum||'';
  qEl.style.display='block'; qEl.textContent=d.question;
  if (d.answer) { aEl.style.display='block'; aEl.textContent=d.answer; }
  else aEl.style.display='none';
});

// Host state — update control panel and category grid
onValue(ref(db,'hostState'), snap => {
  const d = snap.val();
  if (!d) return;

  // Status bar
  const current = ROUNDS.find(r=>r.id===d.currentRound);
  document.getElementById('ctrl-cat').textContent = current ? `فقرة ${current.num}: ${current.name}` : 'القائمة الرئيسية';
  document.getElementById('ctrl-q').textContent = d.currentQ >= 0 ? `سؤال ${d.currentQ+1}` : (d.currentQ===-1?'العنوان':'');

  // Enable/disable nav based on state
  const hasCat = !!d.currentRound;
  document.getElementById('btn-next').disabled = !hasCat;
  document.getElementById('btn-prev').disabled = !hasCat || (d.currentQ||0) <= -1;

  // Team names for cat3
  if (d.teamA) document.getElementById('c3-na').textContent = d.teamA;
  if (d.teamB) document.getElementById('c3-nb').textContent = d.teamB;

  // Category grid
  const done = d.done || [];
  document.getElementById('cat-grid').innerHTML = ROUNDS.map(r=>`
    <button class="cat-btn ${done.includes(r.id)?'done':''} ${d.currentRound===r.id?'current':''}"
      onclick="${done.includes(r.id)?'':(`sendCmd('openCat',{id:'${r.id}'})`).replace(/'/g,"\"")}"
      ${done.includes(r.id)?'disabled':''}>
      فقرة ${r.num}<br>${r.name}
    </button>`).join('');

  // Cat3 room listener
  if (d.cat3RoomId && d.cat3RoomId !== window._cat3RoomListening) {
    window._cat3RoomListening = d.cat3RoomId;
    onValue(ref(db,`rooms/${d.cat3RoomId}`), rSnap => {
      const r = rSnap.val(); if(!r) return;
      const bids = r.bids||{};
      document.getElementById('c3-ba').textContent = bids.a?.value||'—';
      document.getElementById('c3-bb').textContent = bids.b?.value||'—';
      const wEl = document.getElementById('c3-winner');
      if (r.auctionWinner) {
        const wName = r.auctionWinner==='a'?r.teamA:r.teamB;
        wEl.style.display='block';
        wEl.textContent=`🏆 ${wName} فاز بـ ${r.winningBid} أجوبة`;
      } else wEl.style.display='none';
      const answers = r.answers||[];
      document.getElementById('c3-answers').innerHTML = answers.length ? answers.map((a,i)=>`
        <div class="ans-chip chip-${a.status==='correct'?'ok':a.status==='wrong'?'no':'p'}">
          <span>${i+1}.</span><span style="flex:1">${a.text}</span>
          <span>${a.status==='correct'?'✅':a.status==='wrong'?'❌':'⏳'}</span>
        </div>`).join('') :
        '<div style="color:rgba(255,255,255,0.25);text-align:center;font-size:12px">لم تُكتب أجوبة بعد</div>';
    });
  }
});
</script>
</body>
</html>
