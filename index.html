<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>3AL BALCON — Game Show Night!</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --neon-pink: #FF2D78;
  --neon-cyan: #00EFFF;
  --neon-yellow: #FFE600;
  --neon-green: #39FF14;
  --neon-red: #FF2D2D;
  --neon-blue: #3B9EFF;
  --gold: #FFE600;
  --gold2: #FFC800;
  --dark: #0a1628;
  --dark2: rgba(0,0,40,0.55);
  --dark3: rgba(0,10,50,0.8);
  --text: #FFFFFF;
  --text2: #c8e0ff;
  --glow-pink: 0 0 12px #FF2D78, 0 0 30px rgba(255,45,120,0.5);
  --glow-cyan: 0 0 12px #00EFFF, 0 0 30px rgba(0,239,255,0.4);
  --glow-yellow: 0 0 12px #FFE600, 0 0 30px rgba(255,230,0,0.4);
  --glow-green: 0 0 12px #39FF14, 0 0 30px rgba(57,255,20,0.4);
  --glow-red: 0 0 12px #FF2D2D, 0 0 30px rgba(255,45,45,0.5);
}

* { margin:0; padding:0; box-sizing:border-box; }

html {
  height: -webkit-fill-available;
}
body {
  font-family: 'Cairo', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  min-height: 100dvh;
  overflow: hidden;
  touch-action: pan-y;
}

/* ── CUSTOM BACKGROUND IMAGE ── */
#bg-image-layer {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 0;
  transition: opacity 0.5s;
}
#bg-image-layer.active {
  opacity: 1;
}
#bg-image-layer.active ~ .stars {
  display: none;
}

/* ── BRICK WALL BACKGROUND ── */
.stars {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
}
.stars::before {
  content:''; position:absolute; inset:0;
  background-color: #0d1f3c;
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 30px,
      rgba(0,0,0,0.35) 30px,
      rgba(0,0,0,0.35) 34px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 59px,
      rgba(0,0,0,0.25) 59px,
      rgba(0,0,0,0.25) 62px
    );
  background-size: 62px 34px;
}
.stars::after {
  content:''; position:absolute; inset:0;
  background:
    radial-gradient(ellipse at 15% 50%, rgba(0,80,200,0.55) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 50%, rgba(0,50,180,0.45) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 0%, rgba(0,100,255,0.3) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 100%, rgba(0,20,100,0.6) 0%, transparent 50%);
}

/* ── SCREENS ── */
.screen {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 20px;
  transition: opacity 0.5s, transform 0.5s;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  height: 100dvh;
  height: -webkit-fill-available;
}
.screen.hidden { opacity:0; pointer-events:none; transform: scale(0.97); }

/* ── SETUP SCREEN ── */
#setup-screen {
  gap: 24px;
  justify-content: center;
  padding-top: 40px;
  padding-bottom: 40px;
}
.show-logo {
  text-align: center;
  margin-bottom: 8px;
}
.show-logo .en-title {
  font-family: 'Cairo', sans-serif;
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 900;
  color: var(--neon-yellow);
  text-shadow: var(--glow-yellow);
  letter-spacing: 4px;
  line-height: 1.1;
}
.show-logo .ar-title {
  font-size: clamp(18px, 3vw, 28px);
  color: var(--neon-cyan);
  text-shadow: var(--glow-cyan);
  font-weight: 700;
}
.show-logo .subtitle {
  font-size: clamp(12px, 2vw, 16px);
  color: var(--neon-pink);
  text-shadow: var(--glow-pink);
  letter-spacing: 2px;
  margin-top: 4px;
}

.setup-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
  width: 100%;
  max-width: 900px;
}

.setup-card {
  background: rgba(0,10,50,0.6);
  border: 2px solid var(--neon-pink);
  box-shadow: var(--glow-pink), inset 0 0 20px rgba(255,45,120,0.05);
  border-radius: 16px;
  padding: 20px;
  display: flex; flex-direction: column; gap: 12px;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.setup-card:hover { border-color: var(--neon-cyan); box-shadow: var(--glow-cyan); }
.setup-card h3 {
  font-size: 15px; font-weight: 700;
  color: var(--neon-yellow);
  text-shadow: var(--glow-yellow);
  display: flex; align-items: center; gap: 8px;
}
.setup-card .icon { font-size: 20px; }
.setup-card p { font-size: 12px; color: var(--text2); line-height: 1.5; }

.upload-btn {
  background: rgba(0,239,255,0.08);
  border: 2px dashed var(--neon-cyan);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'Cairo', sans-serif;
  color: var(--neon-cyan);
  text-shadow: var(--glow-cyan);
  font-size: 13px;
  font-weight: 600;
}
.upload-btn:hover { background: rgba(0,239,255,0.18); box-shadow: var(--glow-cyan); }
.upload-btn input { display: none; }

.upload-status {
  font-size: 12px;
  color: var(--neon-green);
  text-shadow: var(--glow-green);
  text-align: center;
  min-height: 16px;
}

.team-inputs {
  display: flex; gap: 10px; flex-direction: column;
}
.team-input {
  background: rgba(0,0,50,0.5);
  border: 2px solid var(--neon-pink);
  box-shadow: var(--glow-pink);
  border-radius: 8px;
  padding: 10px 14px;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 15px;
  font-weight: 700;
  width: 100%;
  text-align: right;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.team-input:focus { border-color: var(--neon-yellow); box-shadow: var(--glow-yellow); }
[contenteditable][data-placeholder]:empty:before {
  content: attr(data-placeholder);
  color: rgba(200,224,255,0.4);
  pointer-events: none;
}

.questions-textarea {
  background: rgba(0,0,50,0.5);
  border: 2px solid rgba(0,239,255,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  color: #fff;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  width: 100%;
  text-align: right;
  outline: none;
  resize: vertical;
  min-height: 80px;
  transition: border-color 0.2s;
}
.questions-textarea:focus { border-color: var(--neon-cyan); box-shadow: var(--glow-cyan); }
.questions-textarea::placeholder { color: rgba(200,224,255,0.4); }

.start-btn {
  background: transparent;
  color: var(--neon-green);
  border: 3px solid var(--neon-green);
  box-shadow: var(--glow-green), inset 0 0 20px rgba(57,255,20,0.1);
  border-radius: 14px;
  padding: 16px 48px;
  font-family: 'Cairo', sans-serif;
  font-size: 22px;
  font-weight: 900;
  cursor: pointer;
  text-shadow: var(--glow-green);
  transition: all 0.2s;
  letter-spacing: 2px;
}
.start-btn:hover { background: rgba(57,255,20,0.15); transform: scale(1.04); box-shadow: 0 0 40px rgba(57,255,20,0.7), inset 0 0 30px rgba(57,255,20,0.2); }

/* ── MAIN MENU ── */
#menu-screen {
  gap: 20px;
  justify-content: flex-start;
  align-items: center;
  padding-top: 60px;
  padding-bottom: 40px;
  text-align: center;
}
.menu-logo { text-align: center; }
.menu-logo .big { font-size: clamp(32px, 6vw, 64px); font-weight: 900; color: var(--neon-yellow); text-shadow: var(--glow-yellow); letter-spacing: 6px; }
.menu-logo .small { font-size: clamp(14px, 2.5vw, 22px); color: var(--neon-cyan); text-shadow: var(--glow-cyan); font-weight: 600; }

.scoreboard {
  display: flex; gap: 40px; align-items: center;
  background: rgba(0,10,50,0.6);
  border: 2px solid var(--neon-cyan);
  box-shadow: var(--glow-cyan);
  border-radius: 20px;
  padding: 20px 40px;
}
.team-score { text-align: center; }
.team-score .name { font-size: 48px; font-weight: 900; }
.team-score .score {
  font-size: clamp(45px, 6.25vw, 70px);
  font-weight: 900;
  color: #fff;
  line-height: 1;
  text-shadow: 0 0 20px #fff;
}
.vs { font-size: 30px; color: var(--text2); font-weight: 900; }

.rounds-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  max-width: 900px;
  width: 100%;
}
.round-btn {
  background: rgba(0,10,50,0.5);
  border: 2px solid var(--neon-pink);
  box-shadow: var(--glow-pink);
  border-radius: 14px;
  padding: 17.5px 12.5px;
  cursor: pointer;
  transition: all 0.25s;
  text-align: center;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
}
.round-btn:hover { border-color: var(--neon-cyan); box-shadow: var(--glow-cyan); transform: translateY(-3px); }
.round-btn .rnum { font-size: 13.75px; color: var(--neon-yellow); text-shadow: var(--glow-yellow); font-weight: 700; margin-bottom: 4px; }
.round-btn .rname { font-size: 23.4px; font-weight: 700; line-height: 1.3; color: #fff; }
.round-btn .rpoints { display: none; }
.round-btn.done { border-color: var(--neon-green); box-shadow: var(--glow-green); }
.round-btn.done .rnum { color: var(--neon-green); text-shadow: var(--glow-green); }

.wildcard-btn {
  background: rgba(0,10,50,0.5);
  border: 2px solid var(--neon-cyan);
  box-shadow: var(--glow-cyan);
  border-radius: 14px;
  padding: 12px 24px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  color: var(--neon-cyan);
  text-shadow: var(--glow-cyan);
  font-size: 15px;
  font-weight: 700;
  transition: all 0.2s;
}
.wildcard-btn:hover { background: rgba(0,239,255,0.12); transform: translateY(-2px); }

.wildcard-btn { font-size: 18.75px; padding: 15px 30px; }

/* ── GAME SCREEN ── */
#game-screen { padding: 0; }

.game-header {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px;
  background: rgba(0,10,40,0.85);
  border-bottom: 2px solid var(--neon-cyan);
  box-shadow: 0 2px 20px rgba(0,239,255,0.3);
  z-index: 20;
}
.game-header .round-title { font-size: clamp(14px, 2.5vw, 20px); font-weight: 900; color: var(--neon-cyan); text-shadow: var(--glow-cyan); }
.game-scores {
  display: flex; gap: 20px; align-items: center;
}
.gs-team { text-align: center; }
.gs-team .gs-name { font-size: 11px; color: var(--text2); }
.gs-team .gs-score { font-size: 24px; font-weight: 900; color: #fff; text-shadow: 0 0 12px #fff; line-height: 1; }
.gs-vs { font-size: 14px; color: var(--text2); }

.back-btn {
  background: rgba(0,10,50,0.6);
  border: 2px solid var(--neon-pink);
  box-shadow: var(--glow-pink);
  border-radius: 8px;
  padding: 8px 16px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  color: var(--neon-pink);
  text-shadow: var(--glow-pink);
  font-size: 13px;
  font-weight: 700;
  transition: all 0.2s;
}
.back-btn:hover { background: rgba(255,45,120,0.15); }

/* ── SLIDE AREA ── */
.slide-area {
  position: absolute;
  inset: 72px 0 0 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 40px 20px 40px 20px;
  gap: 20px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* RULES SLIDE */
.rules-card {
  background: rgba(0,10,50,0.6);
  border: 3px solid var(--neon-green);
  box-shadow: var(--glow-green), inset 0 0 30px rgba(57,255,20,0.05);
  border-radius: 20px;
  padding: 32px 40px;
  max-width: 600px;
  text-align: center;
}
.rules-card h2 { font-size: clamp(20px, 3vw, 30px); font-weight: 900; color: var(--neon-green); text-shadow: var(--glow-green); margin-bottom: 20px; }
.rules-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
.rules-list li {
  background: rgba(57,255,20,0.06);
  border: 1px solid rgba(57,255,20,0.2);
  border-radius: 10px;
  padding: 10px 16px;
  font-size: clamp(13px, 1.8vw, 16px);
  font-weight: 700;
  color: #d0ffb0;
  display: flex; align-items: center; gap: 10px;
}
.rules-list .rule-icon { font-size: 18px; }

/* QUESTION SLIDE */
.question-container {
  display: flex; flex-direction: column;
  align-items: center; gap: 20px;
  width: 100%; max-width: 900px;
}

.question-number {
  font-size: 14px; color: var(--text2); font-weight: 700;
  letter-spacing: 2px;
}

.image-reveal {
  position: relative;
  width: min(360px, 75vw);
  aspect-ratio: 1;
  border-radius: 4px;
  overflow: hidden;
  border: 10px solid #c8960c;
  outline: 3px solid #8B6914;
  box-shadow: 0 0 0 4px #c8960c, 0 8px 40px rgba(0,0,0,0.7), inset 0 0 0 2px #FFD700;
  cursor: pointer;
  background: #1a1a2e;
}
.image-reveal img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: filter 0.8s;
}
.image-reveal.blurred img { filter: blur(20px) brightness(0.2); }
.image-reveal .reveal-hint {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--neon-yellow); font-weight: 900;
  text-shadow: var(--glow-yellow);
  transition: opacity 0.3s;
}
.image-reveal.blurred .reveal-hint { opacity: 1; }
.image-reveal:not(.blurred) .reveal-hint { opacity: 0; }

.question-text-box {
  background: rgba(0,10,50,0.6);
  border: 3px solid var(--neon-cyan);
  box-shadow: var(--glow-cyan), inset 0 0 20px rgba(0,239,255,0.05);
  border-radius: 16px;
  padding: 24px 36px;
  font-size: clamp(18px, 3vw, 28px);
  font-weight: 900;
  text-align: center;
  width: 100%;
  max-width: 700px;
  min-height: 80px;
  display: flex; align-items: center; justify-content: center;
  line-height: 1.4;
  color: #fff;
}

.answer-reveal-btn {
  background: rgba(0,10,50,0.6);
  border: 2px solid var(--neon-yellow);
  box-shadow: var(--glow-yellow);
  border-radius: 12px;
  padding: 12px 32px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  color: var(--neon-yellow);
  text-shadow: var(--glow-yellow);
  font-size: 15px;
  font-weight: 700;
  transition: all 0.2s;
}
.answer-reveal-btn:hover { background: rgba(255,230,0,0.15); }

.answer-box {
  background: rgba(57,255,20,0.1);
  border: 2px solid var(--neon-green);
  box-shadow: var(--glow-green);
  border-radius: 12px;
  padding: 14px 28px;
  font-size: clamp(16px, 2.5vw, 22px);
  font-weight: 900;
  color: var(--neon-green);
  text-shadow: var(--glow-green);
  text-align: center;
  min-width: 200px;
  transition: all 0.3s;
}

/* SCORE PANEL */
.score-panel {
  display: flex; gap: 12px; align-items: center;
  background: rgba(0,10,50,0.7);
  border: 2px solid var(--neon-cyan);
  box-shadow: var(--glow-cyan);
  border-radius: 16px;
  padding: 14px 24px;
  flex-wrap: wrap;
  justify-content: center;
}
.sp-team { display: flex; align-items: center; gap: 10px; }
.sp-name { font-size: 14px; font-weight: 700; color: var(--text2); }
.sp-score { font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 0 16px #fff; min-width: 44px; text-align: center; }
.sp-btn {
  width: 40px; height: 40px;
  border-radius: 8px;
  border: 2px solid;
  cursor: pointer;
  font-size: 18px;
  font-weight: 900;
  font-family: 'Cairo', sans-serif;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
}
.sp-btn.plus { border-color: var(--neon-green); color: var(--neon-green); box-shadow: var(--glow-green); }
.sp-btn.plus:hover { background: rgba(57,255,20,0.2); transform: scale(1.1); }
.sp-btn.minus { border-color: var(--neon-red); color: var(--neon-red); box-shadow: var(--glow-red); }
.sp-btn.minus:hover { background: rgba(255,45,45,0.2); transform: scale(1.1); }
.sp-divider { width: 1px; height: 40px; background: rgba(0,239,255,0.3); margin: 0 8px; }

/* TIMER */
.timer-display {
  position: relative;
  width: 160px; height: 160px;
}
.timer-circle { transform: rotate(-90deg); }
.timer-bg { fill: none; stroke: rgba(0,239,255,0.15); stroke-width: 8; }
.timer-fill {
  fill: none;
  stroke: var(--neon-cyan);
  stroke-width: 8;
  stroke-linecap: round;
  filter: drop-shadow(0 0 6px var(--neon-cyan));
  transition: stroke-dashoffset 1s linear, stroke 0.5s;
}
.timer-number {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 52px; font-weight: 900;
  color: var(--neon-cyan);
  text-shadow: var(--glow-cyan);
}
.timer-number.urgent { color: var(--neon-red); text-shadow: var(--glow-red); animation: pulse 0.5s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

.timer-btn {
  background: rgba(0,10,50,0.6);
  border: 2px solid var(--neon-cyan);
  box-shadow: var(--glow-cyan);
  border-radius: 10px;
  padding: 10px 24px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  color: var(--neon-cyan);
  text-shadow: var(--glow-cyan);
  font-size: 15px;
  font-weight: 700;
  transition: all 0.2s;
}
.timer-btn:hover { background: rgba(0,239,255,0.15); }

/* NAV BUTTONS */
.nav-btns {
  display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
}
.nav-btn {
  background: rgba(0,10,50,0.6);
  border: 2px solid rgba(255,255,255,0.2);
  border-radius: 10px;
  padding: 10px 24px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  transition: all 0.2s;
}
.nav-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); text-shadow: var(--glow-cyan); }
.nav-btn.primary {
  background: rgba(0,10,50,0.6);
  border: 2px solid var(--neon-green);
  box-shadow: var(--glow-green);
  color: var(--neon-green);
  text-shadow: var(--glow-green);
}
.nav-btn.primary:hover { background: rgba(57,255,20,0.15); transform: scale(1.03); }

/* BIDDING */
.bidding-panel {
  display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; align-items: center;
}
.bid-team {
  background: rgba(0,10,50,0.6);
  border: 2px solid var(--neon-pink);
  box-shadow: var(--glow-pink);
  border-radius: 14px;
  padding: 16px 24px;
  text-align: center;
  min-width: 160px;
}
.bid-team .bt-name { font-size: 13px; color: var(--text2); font-weight: 700; margin-bottom: 8px; }
.bid-value { font-size: 36px; font-weight: 900; color: #fff; text-shadow: 0 0 16px #fff; }
.bid-controls { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }
.bid-btn {
  width: 40px; height: 40px; border-radius: 8px; border: 2px solid;
  cursor: pointer; font-size: 18px; font-weight: 900;
  font-family: 'Cairo', sans-serif; transition: all 0.15s; background: transparent;
}
.bid-btn.up { border-color: var(--neon-green); color: var(--neon-green); }
.bid-btn.up:hover { background: rgba(57,255,20,0.2); }
.bid-btn.down { border-color: var(--neon-red); color: var(--neon-red); }
.bid-btn.down:hover { background: rgba(255,45,45,0.2); }
.winner-btn {
  background: transparent;
  border: 2px solid var(--neon-yellow);
  box-shadow: var(--glow-yellow);
  border-radius: 10px;
  padding: 10px 20px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  color: var(--neon-yellow); text-shadow: var(--glow-yellow);
  font-size: 13px; font-weight: 900;
  margin-top: 10px; width: 100%;
  transition: all 0.2s;
}
.winner-btn:hover { background: rgba(255,230,0,0.15); }

/* RESULT SCREEN */
.result-card {
  background: rgba(0,10,50,0.7);
  border: 3px solid var(--neon-yellow);
  box-shadow: var(--glow-yellow), inset 0 0 40px rgba(255,230,0,0.05);
  border-radius: 24px;
  padding: 40px 60px;
  text-align: center;
}
.result-card h2 { font-size: clamp(20px, 3vw, 28px); color: var(--neon-green); text-shadow: var(--glow-green); margin-bottom: 20px; font-weight: 900; }
.result-scores {
  display: flex; gap: 40px; align-items: center; justify-content: center;
  margin-bottom: 24px;
}
.rs-team { text-align: center; }
.rs-name { font-size: 16px; color: var(--text2); font-weight: 700; }
.rs-score { font-size: clamp(48px, 7vw, 80px); font-weight: 900; color: #fff; text-shadow: 0 0 30px #fff; }
.rs-vs { font-size: 28px; color: var(--text2); font-weight: 900; }
.rs-winner { font-size: clamp(16px, 2.5vw, 22px); color: var(--neon-green); text-shadow: var(--glow-green); font-weight: 900; margin-bottom: 20px; }



/* MEDIA PLAYER */
.media-player {
  background: rgba(0,10,50,0.6);
  border: 2px solid var(--neon-cyan);
  box-shadow: var(--glow-cyan);
  border-radius: 16px;
  padding: 16px 24px;
  display: flex; align-items: center; gap: 16px;
  width: 100%; max-width: 500px;
}
.play-btn {
  width: 52px; height: 52px;
  background: transparent;
  border: 2px solid var(--neon-yellow);
  box-shadow: var(--glow-yellow);
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  color: var(--neon-yellow);
  transition: all 0.2s;
  flex-shrink: 0;
}
.play-btn:hover { background: rgba(255,230,0,0.2); transform: scale(1.1); }
.media-info { flex: 1; }
.media-name { font-size: 14px; font-weight: 700; color: #fff; }
.media-sub { font-size: 12px; color: var(--text2); }
audio, video { display: none; }

/* SECTION TITLE SLIDE */
.section-title-slide {
  text-align: center;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px;
  width: 100%;
  min-height: calc(100vh - 120px);
}
.section-title-slide .big-number {
  font-size: clamp(80px, 15vw, 160px);
  font-weight: 900;
  color: rgba(0,239,255,0.07);
  line-height: 1;
  position: absolute;
}
.section-title-slide h1 {
  font-size: clamp(40px, 8.4vw, 126px);
  font-weight: 900;
  color: var(--neon-cyan);
  text-shadow: var(--glow-cyan);
  position: relative;
  z-index: 1;
  border: 3px solid var(--neon-cyan);
  box-shadow: var(--glow-cyan);
  border-radius: 16px;
  padding: 16px 40px;
  background: rgba(0,10,50,0.6);
}
.section-title-slide p {
  font-size: clamp(14px, 2vw, 20px);
  color: var(--neon-green);
  text-shadow: var(--glow-green);
  font-weight: 700;
}

/* WILDCARDS */
.wildcard-grid {
  display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
}
.wc-card {
  background: rgba(0,10,50,0.6);
  border: 2px solid var(--neon-cyan);
  box-shadow: var(--glow-cyan);
  border-radius: 20px;
  padding: 24px 32px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  min-width: 160px;
}
.wc-card:hover { transform: translateY(-4px); border-color: var(--neon-yellow); box-shadow: var(--glow-yellow); }
.wc-card .wc-icon { font-size: 36px; margin-bottom: 8px; }
.wc-card .wc-name { font-size: 16px; font-weight: 900; color: var(--neon-cyan); text-shadow: var(--glow-cyan); }
.wc-card .wc-desc { font-size: 12px; color: var(--text2); margin-top: 4px; }

/* AUDIO INDICATOR */
.audio-indicator {
  display: flex; gap: 4px; align-items: flex-end; height: 24px;
}
.audio-bar {
  width: 4px; background: var(--neon-cyan); border-radius: 2px;
  box-shadow: var(--glow-cyan);
  animation: audio-bounce 0.6s ease-in-out infinite;
}
.audio-bar:nth-child(2) { animation-delay: 0.1s; }
.audio-bar:nth-child(3) { animation-delay: 0.2s; }
.audio-bar:nth-child(4) { animation-delay: 0.15s; }
.audio-bar:nth-child(5) { animation-delay: 0.05s; }
@keyframes audio-bounce {
  0%,100% { height: 6px; }
  50% { height: 20px; }
}

/* TOAST */
.toast {
  position: fixed; top: 90px; left: 50%; transform: translateX(-50%);
  background: rgba(0,10,50,0.9);
  border: 2px solid var(--neon-yellow);
  box-shadow: var(--glow-yellow);
  border-radius: 12px;
  padding: 12px 28px;
  font-size: 16px; font-weight: 900;
  color: var(--neon-yellow);
  text-shadow: var(--glow-yellow);
  z-index: 1000;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  white-space: nowrap;
}
.toast.show { opacity: 1; }

/* QUESTION GRID (for image rounds) */
.q-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  width: 100%;
  max-width: 700px;
}
.q-grid-btn {
  background: rgba(0,10,50,0.6);
  border: 2px solid var(--neon-pink);
  box-shadow: var(--glow-pink);
  border-radius: 10px;
  padding: 12px 6px;
  cursor: pointer;
  font-family: 'Cairo', sans-serif;
  font-size: 18px; font-weight: 900;
  color: var(--neon-pink);
  text-shadow: var(--glow-pink);
  transition: all 0.2s;
  text-align: center;
}
.q-grid-btn:hover { border-color: var(--neon-yellow); color: var(--neon-yellow); text-shadow: var(--glow-yellow); transform: scale(1.05); }
.q-grid-btn.used { border-color: var(--neon-green); color: var(--neon-green); text-shadow: var(--glow-green); box-shadow: var(--glow-green); }
.q-grid-btn.active { border-color: var(--neon-yellow); color: var(--neon-yellow); box-shadow: var(--glow-yellow); }

/* CLOSE GUESS */
.close-display {
  display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
}
.close-team {
  background: rgba(0,10,50,0.6);
  border: 2px solid var(--neon-pink);
  box-shadow: var(--glow-pink);
  border-radius: 14px;
  padding: 14px 20px;
  text-align: center;
  min-width: 140px;
}
.close-team .ct-name { font-size: 13px; color: var(--text2); font-weight: 700; }
.close-team input {
  background: transparent;
  border: none;
  border-bottom: 2px solid var(--neon-yellow);
  color: var(--neon-yellow);
  text-shadow: var(--glow-yellow);
  font-family: 'Cairo', sans-serif;
  font-size: 32px; font-weight: 900;
  text-align: center;
  width: 100%;
  outline: none;
  margin-top: 8px;
}

/* CREDITS */
.credits-scroll {
  max-height: calc(100vh - 120px);
  overflow-y: auto;
  width: 100%;
  max-width: 600px;
  text-align: center;
  padding: 20px;
}
.credits-scroll::-webkit-scrollbar { width: 4px; }
.credits-scroll::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 2px; }
.credit-row {
  display: flex; justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(0,239,255,0.1);
  font-size: 13px;
}
.credit-role { color: var(--text2); }
.credit-name { color: var(--neon-yellow); text-shadow: var(--glow-yellow); font-weight: 700; }

/* ANIMATIONS */
@keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeIn 0.4s ease forwards; }
@keyframes slideIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
.slide-in { animation: slideIn 0.4s ease forwards; }

/* VIDEO ROUND */
.video-container {
  width: 100%; max-width: 960px; margin: 0 auto;
  border-radius: 16px; overflow: hidden;
  border: 3px solid var(--neon-cyan);
  box-shadow: var(--glow-cyan);
  background: #000;
  aspect-ratio: 16/9;
}
.video-container video {
  display: block;
  width: 100%; height: 100%;
  object-fit: contain;
}
.video-placeholder {
  width: 100%; max-width: 960px;
  aspect-ratio: 16/9;
  border-radius: 16px;
  border: 2px dashed var(--neon-cyan);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
  color: var(--neon-cyan);
}
.video-placeholder .vp-icon { font-size: 48px; }
.video-placeholder p { font-size: 14px; font-weight: 600; }

.char-view {
  width: 100%; max-width: 960px;
  aspect-ratio: 16/9;
  border-radius: 16px;
  border: 3px solid var(--neon-pink);
  box-shadow: var(--glow-pink);
  background: rgba(0,10,50,0.7);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(40px, 8vw, 80px);
  font-weight: 900;
  color: var(--neon-yellow);
  text-shadow: var(--glow-yellow);
  padding: 20px;
  text-align: center;
  line-height: 1.2;
}

/* Responsive */
@media(max-width: 600px) {
  .rounds-grid { grid-template-columns: repeat(2, 1fr); }
  .q-grid { grid-template-columns: repeat(5, 1fr); }
  .scoreboard { gap: 20px; padding: 12px 20px; }
}

/* Drop zone drag-over state */
#drop-zone.drag-over {
  background: rgba(0,239,255,0.12);
  box-shadow: 0 0 30px rgba(0,239,255,0.5);
  border-color: var(--neon-yellow);
}

/* ── TV SCREENS (2560px+) — 1.5x scale ── */
@media(min-width: 2560px) {
  .team-score .name { font-size: 72px !important; }
  .team-score .score { font-size: clamp(68px, 6.25vw, 105px) !important; }
  .vs { font-size: 45px !important; }
  .round-btn .rnum { font-size: 20px !important; }
  .round-btn .rname { font-size: 35px !important; }
  .round-btn { padding: 26px 18px !important; }
  .game-header .round-title { font-size: clamp(21px, 2.5vw, 30px) !important; }
  .gs-team .gs-name { font-size: 16px !important; }
  .gs-team .gs-score { font-size: 36px !important; }
  .back-btn { font-size: 20px !important; padding: 12px 24px !important; }
  .question-number { font-size: 21px !important; }
  .question-text-box { font-size: clamp(27px, 3vw, 42px) !important; padding: 36px 54px !important; }
  .answer-box { font-size: 45px !important; }
  .answer-reveal-btn { font-size: 22px !important; padding: 18px 48px !important; }
  .timer-number { font-size: 78px !important; }
  .timer-btn { font-size: 22px !important; padding: 15px 36px !important; }
  .sp-name { font-size: 21px !important; }
  .sp-score { font-size: 48px !important; }
  .sp-btn { width: 60px !important; height: 60px !important; font-size: 27px !important; }
  .nav-btn { font-size: 21px !important; padding: 15px 36px !important; }
  .start-btn { font-size: 33px !important; padding: 24px 72px !important; }
  .rules-card h2 { font-size: clamp(30px, 3vw, 45px) !important; }
  .rules-list li { font-size: clamp(19px, 1.8vw, 24px) !important; }
  .section-title-slide h1 { font-size: clamp(60px, 8.4vw, 189px) !important; }
  .section-title-slide p { font-size: clamp(21px, 2vw, 30px) !important; }
  .result-card h2 { font-size: clamp(30px, 3vw, 42px) !important; }
  .rs-name { font-size: 24px !important; }
  .rs-score { font-size: clamp(72px, 7vw, 120px) !important; }
  .rs-winner { font-size: clamp(24px, 2.5vw, 33px) !important; }
  .bid-value { font-size: 54px !important; }
  .bt-name { font-size: 19px !important; }
  .wildcard-btn { font-size: 28px !important; padding: 22px 45px !important; }
  .wc-card .wc-name { font-size: 24px !important; }
  .wc-card .wc-desc { font-size: 18px !important; }
  .char-view { font-size: clamp(60px, 8vw, 120px) !important; }
  .scoreboard { padding: 30px 60px !important; gap: 60px !important; }
  .score-panel { padding: 21px 36px !important; }
}
</style>
</head>
<body>
<div id="bg-image-layer"></div>
<div class="stars"></div>
<div class="toast" id="toast"></div>

<!-- ══════════════ SETUP SCREEN ══════════════ -->
<div class="screen" id="setup-screen">

  <!-- Loading status -->
  <div id="auto-load-status" style="display:flex;flex-direction:column;align-items:center;gap:16px">
    <div style="font-family:'Cairo',sans-serif;font-size:clamp(28px,6vw,56px);font-weight:900;text-align:center;line-height:1.2;white-space:nowrap;direction:ltr;unicode-bidi:isolate">
      <span style="color:#FF2D78;text-shadow:0 0 20px #FF2D78,0 0 40px rgba(255,45,120,0.5)">L</span><span style="color:#FFE600;text-shadow:0 0 20px #FFE600">o</span><span style="color:#39FF14;text-shadow:0 0 20px #39FF14">a</span><span style="color:#00EFFF;text-shadow:0 0 20px #00EFFF">d</span><span style="color:#FF2D78;text-shadow:0 0 20px #FF2D78">i</span><span style="color:#FFE600;text-shadow:0 0 20px #FFE600">n</span><span style="color:#39FF14;text-shadow:0 0 20px #39FF14">g</span>
      <span style="color:#00EFFF;text-shadow:0 0 20px #00EFFF"> G</span><span style="color:#FF2D78;text-shadow:0 0 20px #FF2D78">a</span><span style="color:#FFE600;text-shadow:0 0 20px #FFE600">m</span><span style="color:#39FF14;text-shadow:0 0 20px #39FF14">e</span><span style="color:#00EFFF;text-shadow:0 0 20px #00EFFF">.</span><span style="color:#FF2D78;text-shadow:0 0 20px #FF2D78">.</span><span style="color:#FFE600;text-shadow:0 0 20px #FFE600">.</span>
    </div>
    <div style="width:280px;height:6px;background:rgba(0,239,255,0.1);border-radius:100px;overflow:hidden;border:1px solid rgba(0,239,255,0.2)">
      <div id="loading-bar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--neon-cyan),var(--neon-pink));border-radius:100px;transition:width 0.4s ease;box-shadow:0 0 10px rgba(0,239,255,0.6)"></div>
    </div>
  </div>

  <!-- Team Names — shown after load completes -->
  <div id="team-entry" style="display:none;flex-direction:column;align-items:center;gap:20px;width:100%;max-width:400px;margin:0 auto;text-align:center">
    <div style="
      background:rgba(0,10,50,0.7);
      border:2px solid var(--neon-cyan);
      box-shadow:var(--glow-cyan);
      border-radius:20px;
      padding:28px 32px;
      width:100%;
      display:flex;flex-direction:column;gap:16px;
    ">
      <h3 style="font-size:18px;font-weight:900;color:var(--neon-cyan);text-shadow:var(--glow-cyan);text-align:center">🏆 أسماء الفرق</h3>
      <div class="team-inputs">
        <div class="team-input" id="team-a-name" contenteditable="true" data-placeholder="اسم الفريق الأول" style="min-height:44px;line-height:1.4;cursor:text;border-color:var(--neon-red);box-shadow:var(--glow-red)" onkeydown="event.stopPropagation()"></div>
        <div class="team-input" id="team-b-name" contenteditable="true" data-placeholder="اسم الفريق الثاني" style="min-height:44px;line-height:1.4;cursor:text;border-color:var(--neon-yellow);box-shadow:var(--glow-yellow)" onkeydown="event.stopPropagation()"></div>
      </div>
    </div>
    <button class="start-btn" onclick="startGame()">يــــلا نـــلـــعـــب 🎮</button>
  </div>

  <!-- Hidden status divs needed by other functions -->
  <div id="status-drive" style="display:none"></div>
  <div id="drive-details" style="display:none"></div>
  <div id="status-r1" style="display:none"></div>
  <div id="status-r2" style="display:none"></div>
  <div id="status-r5" style="display:none"></div>
  <div id="status-excel" style="display:none"></div>
  <div id="excel-details" style="display:none"></div>
</div>

<!-- ══════════════ MAIN MENU ══════════════ -->
<div class="screen hidden" id="menu-screen">
  <div class="menu-logo" style="display:none"></div>

  <!-- Close button — top left -->
  <div style="position:absolute;top:16px;left:20px;display:flex;flex-direction:column;gap:6px;z-index:5">
    <button onclick="window.location.href='https://www.3albalcon.com'" style="
      background:transparent;
      border:1.5px solid rgba(255,255,255,0.2);
      color:rgba(255,255,255,0.35);
      font-size:15px;font-weight:700;
      padding:7px 18px;border-radius:100px;
      font-family:'Cairo',sans-serif;
      cursor:pointer;transition:all 0.2s;
      letter-spacing:1px;
    "
    onmouseover="this.style.borderColor='var(--neon-cyan)';this.style.color='var(--neon-cyan)';this.style.textShadow='var(--glow-cyan)'"
    onmouseout="this.style.borderColor='rgba(255,255,255,0.2)';this.style.color='rgba(255,255,255,0.35)';this.style.textShadow='none'"
    >🚪 اغلاق اللعبة</button>
  </div>

  <div class="scoreboard">
    <div class="team-score">
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap">
        <div class="name" id="mn-a-name">الفريق A</div>
        <div id="wc-badges-a" style="display:flex;gap:4px;flex-wrap:wrap"></div>
      </div>
      <div class="score" id="mn-a-score">0</div>
    </div>
    <div class="vs">VS</div>
    <div class="team-score">
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap">
        <div class="name" id="mn-b-name">الفريق B</div>
        <div id="wc-badges-b" style="display:flex;gap:4px;flex-wrap:wrap"></div>
      </div>
      <div class="score" id="mn-b-score">0</div>
    </div>
  </div>

  <!-- Data loading status -->
  <div id="data-status" style="
    font-size:13px;font-weight:700;text-align:center;
    color:var(--neon-yellow);text-shadow:var(--glow-yellow);
    display:flex;align-items:center;gap:8px;justify-content:center;
  ">
    <span id="data-status-icon">⏳</span>
    <span id="data-status-text">جاري تحميل الأسئلة والصور...</span>
  </div>

  <div class="rounds-grid" id="rounds-grid"></div>

  <div id="earned-wc-bar" style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center;align-items:flex-start;width:100%;max-width:900px"></div>

  <div style="display:flex;flex-direction:column;align-items:center;gap:12px;width:100%">
    <button onclick="toggleRoulette()" id="roulette-toggle-btn" style="background:rgba(255,45,120,0.1);border:2px solid var(--neon-pink);color:#ffffff;text-shadow:none;font-size:22px;font-weight:900;padding:10px 56px;letter-spacing:2px;box-shadow:var(--glow-pink);border-radius:100px;font-family:'Cairo',sans-serif;cursor:pointer;transition:all 0.2s;">🎰 شو بدنا نختار</button>
  </div>

  <!-- Roulette Inline Panel -->
  <div id="roulette-panel" style="display:none;flex-direction:column;align-items:center;gap:16px;
    width:100%;max-width:500px;
    background:rgba(0,10,50,0.7);
    border:2px solid var(--neon-pink);
    box-shadow:var(--glow-pink);
    border-radius:20px;
    padding:20px 24px;">


    <!-- Drum -->
    <div style="position:relative;width:100%;height:64px;overflow:hidden;
      border:2px solid var(--neon-yellow);box-shadow:var(--glow-yellow);
      border-radius:12px;background:rgba(0,0,30,0.8)">
      <div style="position:absolute;top:50%;left:0;right:0;height:32px;transform:translateY(-50%);
        background:rgba(255,230,0,0.07);z-index:1;pointer-events:none;
        border-top:1px solid rgba(255,230,0,0.4);border-bottom:1px solid rgba(255,230,0,0.4)"></div>
      <div style="position:absolute;top:0;left:0;right:0;height:16px;
        background:linear-gradient(to bottom,rgba(0,0,30,0.9),transparent);z-index:2;pointer-events:none"></div>
      <div style="position:absolute;bottom:0;left:0;right:0;height:16px;
        background:linear-gradient(to top,rgba(0,0,30,0.9),transparent);z-index:2;pointer-events:none"></div>
      <div id="roulette-strip" style="position:absolute;width:100%;display:flex;flex-direction:column;align-items:center;top:0"></div>
    </div>

    <!-- Result -->
    <div id="roulette-result" style="font-size:16px;font-weight:900;color:var(--neon-yellow);text-shadow:var(--glow-yellow);text-align:center;min-height:24px"></div>

    <!-- Buttons -->
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="nav-btn primary" id="roulette-spin-btn" onclick="spinRoulette()">🎰 دوّر!</button>
      <button class="nav-btn primary" id="roulette-go-btn" style="display:none;border-color:var(--neon-green);color:var(--neon-green);text-shadow:var(--glow-green);box-shadow:var(--glow-green)" onclick="goToRouletteRound()">← ابدأ الفقرة</button>
    </div>
  </div>
</div>

<!-- ══════════════ GAME SCREEN ══════════════ -->
<div class="screen hidden" id="game-screen">
  <div class="game-header">
    <button class="back-btn" onclick="backToMenu()">← القائمة</button>
    <div class="round-title" id="gh-title">—</div>

// SINGLE DROP ZONE — sorts files by folder

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const items = e.dataTransfer.items;
  if (items && items.length > 0 && items[0].webkitGetAsEntry) {
    const allFiles = [];
    let pending = 0;
    function done() { if (pending === 0) processAllFiles(allFiles); }
    function scanEntry(entry, path) {
      if (entry.isFile) {
        pending++;
        entry.file(f => {
          // Attach relative path so processAllFiles can sort by folder
          Object.defineProperty(f, 'webkitRelativePath', { value: path + f.name, writable: false });
          allFiles.push(f);
          pending--;
          done();
        });
      } else if (entry.isDirectory) {
        const reader = entry.createReader();
        pending++;
        reader.readEntries(entries => {
          pending--;
          entries.forEach(child => scanEntry(child, path + entry.name + '/'));
          done();
        });
      }
    }
    Array.from(items).forEach(item => {
      const entry = item.webkitGetAsEntry();
      if (entry) scanEntry(entry, '');
    });
  } else {
    handleFiles(e.dataTransfer.files);
  }
}

function handleFiles(files) {
  const all = Array.from(files);
  // Attach folder path from webkitRelativePath if available
  all.forEach(f => { if (!f._folderPath) f._folderPath = f.webkitRelativePath || ''; });
  processAllFiles(all);
}

function processAllFiles(all) {
  const imageExts = ['jpg','jpeg','png','gif','webp','bmp'];
  const videoExts = ['mp4','mov','avi','mkv','webm','m4v'];
  const excelExts = ['xlsx','xls'];

    const ext = f.name.split('.').pop().toLowerCase();
    const path = (f.webkitRelativePath || f._folderPath || '').toLowerCase();
    // Must be inside a folder whose name contains "image"
    const folder = path.split('/').slice(-2, -1)[0] || '';
    return imageExts.includes(ext) && folder.includes('image');
  });

  const videos = all.filter(f => {
    const ext = f.name.split('.').pop().toLowerCase();
    const path = (f.webkitRelativePath || f._folderPath || '').toLowerCase();
    const folder = path.split('/').slice(-2, -1)[0] || '';
    return videoExts.includes(ext) && folder.includes('video');
  });

  const excels = all.filter(f => {
    const ext = f.name.split('.').pop().toLowerCase();
    return excelExts.includes(ext) &&
           f.name.toLowerCase().replace(/\s+/g,'').includes('questionsandanswers');
  });

  // Fallback: any excel if name doesn't match
  const excelFile = excels.length > 0
    ? excels[0]
    : all.find(f => excelExts.includes(f.name.split('.').pop().toLowerCase()));

  } else {
    document.getElementById('status-r1').textContent = `⚠️ لم يتم العثور على صور في مجلد "image 1"`;
  }

  // Load videos → r5
  if (videos.length > 0) {
    G.media['r5'] = shuffle(videos.map(f => ({ url: URL.createObjectURL(f), name: f.name, type: 'video' })));
    document.getElementById('status-r5').textContent = `✅ ${videos.length} فيديو جاهز`;
  } else {
    document.getElementById('status-r5').textContent = `⚠️ لم يتم العثور على فيديوهات في مجلد "Videos"`;

}

async function fetchWithRetry(url, options = {}, retries = 3, delay = 2000) {
  for (let i = 0; i < retries; i++) {
    try {
      const res = await fetch(url, { redirect: 'follow', ...options });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res;
    } catch(err) {
      if (i < retries - 1) {
        setLoadProgress(0);
        document.getElementById('auto-load-status') && (
          document.getElementById('auto-load-status').querySelector('div').textContent = `⏳ محاولة ${i + 2} من ${retries}...`
        );
        await new Promise(r => setTimeout(r, delay));
      } else {
        throw err;
      }
    }
  }
}

async function fetchDriveFile(baseUrl, fileInfo) {
  try {
    const res = await fetch(`${baseUrl}?action=file&id=${fileInfo.id}&t=${Date.now()}`, { redirect: 'follow' });
    const text = await res.text();
    const data = JSON.parse(text);
    if (data.error) return null;
    const blob = base64ToBlob(data.data, data.mimeType);
    const url = URL.createObjectURL(blob);
    return {
      url, blob,
      name: fileInfo.name,
      answer: fileInfo.name.replace(/\.[^/.]+$/, ''),
      type: data.mimeType.startsWith('video') ? 'video' : 'image'
    };
  } catch(e) { return null; }
}

function base64ToBlob(base64, mimeType) {
  const bytes = atob(base64);
  const arr = new Uint8Array(bytes.length);
  for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
  return new Blob([arr], { type: mimeType });
}

function blobToArrayBuffer(item) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(new Uint8Array(e.target.result));
    reader.onerror = reject;
    // item could be a Blob directly or an object with a blob property
    const blob = (item instanceof Blob) ? item : item.blob;
    if (!blob || !(blob instanceof Blob)) {
      reject(new Error('Invalid blob'));
      return;
    }
    reader.readAsArrayBuffer(blob);
  });
}

function processExcelWorkbook(wb) {
  const details = [];

    const sheet = wb.Sheets[sheetName];
    if (!sheet) return null;
    const rows = XLSX.utils.sheet_to_json(sheet, { header:1, defval:'' }).slice(1);
    if (twoCol) return rows.map(r => ({ q:(r[0]||'').toString().trim(), a:(r[1]||'').toString().trim() })).filter(x=>x.q);
    return rows.map(r => (r[0]||'').toString().trim()).filter(Boolean);
  }

  if (s3) { G.questions.r3 = shuffle([...s3]); details.push(`✅ مزاد علني: ${s3.length} سؤال`); }
  else details.push(`⚠️ Category 3: مش موجود`);

  const s410 = getRows('Category 4-10', true);
  if (s410 && s410.length > 0) {
    const sh = shuffle([...s410]); const half = Math.floor(sh.length/2);
    G.questions.r10 = sh.slice(0, half); G.questions.r9 = sh.slice(half);
    details.push(`✅ متفرقات + من كل وادي: ${s410.length} سؤال`);
  } else details.push(`⚠️ Category 4-10: مش موجود`);

  const sheet6 = wb.Sheets['Category 6'];
  if (sheet6) {
    G.questions.r5 = XLSX.utils.sheet_to_json(sheet6, { header:1, defval:'' }).slice(1)
      .map(r => ({ v:(r[0]||'').toString().trim(), q:(r[1]||'').toString().trim(), a:(r[2]||'').toString().trim() }))
      .filter(x => x.v || x.q);
    details.push(`✅ سكوت و ركز: ${G.questions.r5.length} سؤال`);
  } else details.push(`⚠️ Category 6: مش موجود`);

  const s5 = getRows('Category 5', true);
  if (s5) { G.questions.r4 = shuffle([...s5]); details.push(`✅ الدندنة: ${s5.length} سؤال`); }
  else details.push(`⚠️ Category 5: مش موجود`);

  const s78 = getRows('Category 7-8', true);
  if (s78 && s78.length > 0) {
    const sh = shuffle([...s78]); const half = Math.floor(sh.length/2);
    G.questions.r6 = sh.slice(0, half); G.questions.r7 = sh.slice(half);
    details.push(`✅ يا حبيبي + يا قريب: ${s78.length} سؤال — ${G.questions.r6.length} و ${G.questions.r7.length}`);
  } else details.push(`⚠️ Category 7-8: مش موجود`);

  const s9 = getRows('Category 9', false);
  if (s9) { G.questions.r8 = shuffle([...s9]); details.push(`✅ سكر تمك: ${s9.length} اسم`); }
  else details.push(`⚠️ Category 9: مش موجود`);

  const swc = getRows('Wild Card', true);
  if (swc) { G.wildcards = shuffle([...swc]); details.push(`✅ بطاقة حظّك اليوم: ${swc.length} بطاقة`); }
  else details.push(`⚠️ Wild Card: مش موجود`);

  document.getElementById('status-excel').textContent = `✅ تم تحميل ملف Excel بنجاح`;
  document.getElementById('excel-details').innerHTML = details.join('<br>');
}

// CSV LOADING (direct from Google Drive)
// ══════════════════════════════════════════
async function loadCSVFiles(csvFiles) {
  function parseCSV(text) {
    const lines = text.split('\n').slice(1);
    return lines.map(line => {
      const cols = [];
      let col = '', inQuote = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQuote = !inQuote; }
        else if (ch === ',' && !inQuote) { cols.push(col.trim()); col = ''; }
        else { col += ch; }
      }
      cols.push(col.trim());
      return cols;
    }).filter(r => r[0] && r[0].length > 0);
  }

  function shuffle(arr) {
    for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
    return arr;
  }

  const url = DRIVE_SCRIPT_URL;
  const fetches = Object.entries(csvFiles).map(async ([key, driveUrl]) => {
    try {
      const idMatch = driveUrl.match(/id=([^&]+)/);
      if (!idMatch) return { key, rows: null };
      const fileId = idMatch[1];
      const res = await fetch(`${url}?action=file&id=${fileId}&t=${Date.now()}`, { redirect: 'follow' });
      const data = await res.json();
      if (data.error || !data.data) return { key, rows: null };
      const text = decodeURIComponent(escape(atob(data.data)));
      return { key, rows: parseCSV(text) };
    } catch(e) { return { key, rows: null }; }
  });

  const results = await Promise.all(fetches);

  results.forEach(({ key, rows }) => {
    if (!rows || rows.length === 0) return;
    if (key === 'cat3') {
      G.questions.r3 = shuffle(rows.map(r => r[0]).filter(Boolean));
    } else if (key === 'cat410') {
      const items = rows.map(r => ({ q: r[0], a: r[1] })).filter(x => x.q);
      const sh = shuffle(items); const half = Math.floor(sh.length/2);
      G.questions.r10 = sh.slice(0, half); G.questions.r9 = sh.slice(half);
    } else if (key === 'cat5') {
      G.questions.r4 = shuffle(rows.map(r => ({ q: r[0], a: r[1] })).filter(x => x.q));
    } else if (key === 'cat6') {
      G.questions.r5 = rows.map(r => ({ v: r[0], q: r[1], a: r[2] })).filter(x => x.v || x.q);
    } else if (key === 'cat78') {
      const items = rows.map(r => ({ q: r[0], a: r[1] })).filter(x => x.q);
      const sh = shuffle(items); const half = Math.floor(sh.length/2);
      G.questions.r6 = sh.slice(0, half); G.questions.r7 = sh.slice(half);
    } else if (key === 'cat9') {
      G.questions.r8 = shuffle(rows.map(r => r[0]).filter(Boolean));
    } else if (key === 'wildcard') {
      G.wildcards = shuffle(rows.map(r => ({ q: r[0], a: r[1] })).filter(x => x.q));
    }
  });
}

function confirmUseWildcard(team, index) {
  const cards = team === 'a' ? G.earnedWCA : G.earnedWCB;

function openRound(id) {
  const round = ROUNDS.find(r => r.id === id);

  // Check if data is ready for this round
  const dataMap = {
    'r1': () => G.media.r1.length > 0,
    'r2': () => G.media.r2.length > 0,
    'r3': () => G.questions.r3.length > 0,
    'r4': () => G.questions.r4.length > 0,
    'r5': () => G.media.r5.length > 0,
    'r6': () => G.questions.r6.length > 0,
    'r7': () => G.questions.r7.length > 0,
    'r8': () => G.questions.r8.length > 0,
    'r9': () => G.questions.r9.length > 0,
    'r10': () => G.questions.r10.length > 0,
  };

  if (dataMap[id] && !dataMap[id]()) {
    showToast('⏳ لسا بتتحمل البيانات — انتظر ثانية!');
    return;
  }

  G.currentRound = round;
  G.currentQ = -1;
  document.getElementById('gh-title').textContent = round.name;
  updateHeaderScores();
  show('game-screen');
  renderSlide();
}

function nextQ() {
  G.currentQ++;
  renderSlide();
}

function renderSlide() {
  const r = G.currentRound;
  const sa = document.getElementById('slide-area');
  stopTimer();

  // Reset slide-area to default for all rounds
  sa.style.paddingTop = '';
  sa.style.justifyContent = '';
  sa.style.alignItems = '';

  if (r.slides === 'team+video') {
    sa.style.alignItems = 'center';
  }

  // === TITLE SLIDE (q=-1) ===
  if (G.currentQ === -1) {
    sa.style.justifyContent = 'center';
    sa.innerHTML = `
      <div class="section-title-slide fade-in">
        <div class="big-number">${r.num}</div>
        <h1>${r.name}</h1>
        <p>${r.pts}</p>
        <button class="nav-btn" onclick="nextQ()" style="margin-top:16px;font-size:16px;padding:12px 28px;">📋 قوانين اللعبة ←</button>
      </div>`;
    return;
  }

  // === RULES SLIDE (q=0) ===
  if (G.currentQ === 0) {
    renderRules(r, sa);
    return;
  }

  // === QUESTION SLIDES ===
  const qIndex = G.currentQ - 1;

  if (r.slides === 'buzzer+image') renderBuzzerImage(r, qIndex, sa);
  else if (r.slides === 'bidding') renderBidding(r, qIndex, sa);
  else if (r.slides === 'buzzer+audio') renderBuzzerAudio(r, qIndex, sa);
  else if (r.slides === 'team+video') renderTeamVideo(r, qIndex, sa);
  else if (r.slides === 'closest') renderClosest(r, qIndex, sa);
  else if (r.slides === 'charades') renderCharades(r, qIndex, sa);
  else if (r.slides === 'buzzer+question') renderBuzzerQuestion(r, qIndex, sa);
}

  else G.scoreB = Math.max(0, G.scoreB + val);
  updateHeaderScores();
  document.getElementById('sp-a') && (document.getElementById('sp-a').textContent = G.scoreA);
  document.getElementById('sp-b') && (document.getElementById('sp-b').textContent = G.scoreB);
  document.getElementById('mn-a-score') && (document.getElementById('mn-a-score').textContent = G.scoreA);
  document.getElementById('mn-b-score') && (document.getElementById('mn-b-score').textContent = G.scoreB);
  showToast(val > 0 ? `+${val} نقطة! 🎉` : `${val} نقطة`);
}

// TIMER
// ══════════════════════════════════════════
let timerInterval = null;
let timerVal = 0;
let timerMax = 60;
const CIRCUMFERENCE = 2 * Math.PI * 54;

function timerHTML(seconds=60) {
  return `
    <div class="timer-display">
      <svg class="timer-circle" width="160" height="160" viewBox="0 0 120 120">
        <circle class="timer-bg" cx="60" cy="60" r="54"/>
        <circle class="timer-fill" id="timer-fill" cx="60" cy="60" r="54"
          stroke-dasharray="${CIRCUMFERENCE}"
          stroke-dashoffset="0"/>
      </svg>
      <div class="timer-number" id="timer-num">${seconds}</div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="timer-btn" onclick="startTimer(${seconds})">▶ ابدأ</button>
      <button class="timer-btn" onclick="stopTimer()" style="background:rgba(255,45,45,0.1);border:2px solid var(--neon-red);color:#ffffff;box-shadow:var(--glow-red)">⏹ وقف</button>
    </div>`;
}

function startTimer(seconds) {
  stopTimer();
  timerMax = seconds;
  timerVal = seconds;
  updateTimerUI();
  timerInterval = setInterval(() => {
    timerVal--;
    updateTimerUI();
    if(timerVal <= 0) { stopTimer(); playBuzzer(); showTimerEnd(); }
  }, 1000);
}

function showTimerEnd() {
  const el = document.createElement('div');
  el.id = 'timer-end-overlay';
  el.style.cssText = `
    position:fixed;inset:0;z-index:9999;
    display:flex;align-items:center;justify-content:center;
    background:rgba(0,5,30,0);
    pointer-events:none;
    transition:background 0.2s;
  `;
  el.innerHTML = `
    <div id="timer-end-text" style="
      font-family:'Cairo',sans-serif;
      font-size:clamp(60px,18vw,200px);
      font-weight:900;
      color:var(--neon-red);
      text-shadow:0 0 40px #FF2D2D,0 0 80px rgba(255,45,45,0.6);
      text-align:center;
      opacity:0;
      transform:scale(0.3);
      transition:opacity 0.15s,transform 0.25s cubic-bezier(0.17,0.67,0.12,1.5);
      line-height:1;
      letter-spacing:2px;
    ">انتهى الوقت!</div>
  `;
  document.body.appendChild(el);
  // Animate in
  requestAnimationFrame(() => {
    el.style.background = 'rgba(0,5,30,0.7)';
    const txt = document.getElementById('timer-end-text');
    if(txt) { txt.style.opacity='1'; txt.style.transform='scale(1)'; }
  });
  // Animate out after 1.8s
  setTimeout(() => {
    el.style.background = 'rgba(0,5,30,0)';
    const txt = document.getElementById('timer-end-text');
    if(txt) { txt.style.opacity='0'; txt.style.transform='scale(2)'; txt.style.transition='opacity 0.4s,transform 0.4s'; }
    setTimeout(() => el.remove(), 500);
  }, 1800);
}

function stopTimer() {
  if(timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ── BUZZER SOUND (Web Audio API — no file needed) ──
function playBuzzer() {
  try {
    const c = new (window.AudioContext || window.webkitAudioContext)();
    const o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(400, c.currentTime);
    o.frequency.exponentialRampToValueAtTime(120, c.currentTime + 1.2);
    g.gain.setValueAtTime(0.5, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 1.2);
    o.start(c.currentTime);
    o.stop(c.currentTime + 1.2);
    setTimeout(() => c.close(), 2000);
  } catch(e) {}
}

function updateTimerUI() {
  const numEl = document.getElementById('timer-num');
  const fillEl = document.getElementById('timer-fill');
  if(!numEl) return;
  numEl.textContent = timerVal;
  numEl.className = 'timer-number' + (timerVal <= 10 ? ' urgent' : '');
  if(fillEl) {
    const pct = timerVal / timerMax;
    fillEl.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
    fillEl.style.stroke = timerVal <= 10 ? 'var(--neon-red)' : 'var(--neon-cyan)';
  }
}

let cat3BidCountdownInterval = null;
let cat3LastBidder = null;

function startCat3Listener(roomId, q, qIndex, isLast) {
  const db = window._fbDb;
  const fbRef = window._fbRef;
  const fbSet = window._fbSet;
  const fbUpdate = (path, data) => {
    import("https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js").then(({ update }) => update(fbRef(db, path), data));
  };

  if (!db) return;
  if (cat3Listener) cat3Listener();

  cat3Listener = window._fbOnValue(fbRef(db, `rooms/${roomId}`), (snap) => {
    const data = snap.val();
    if (!data) return;

    const conn = data.connected || {};
    const bids = data.bids || {};
    const bidA = bids.a?.value;
    const bidB = bids.b?.value;

    // Phase: waiting — show connection status
    if (!conn.a || !conn.b) {
      document.getElementById('conn-a').textContent = conn.a ? '✅ متصل' : '⏳ انتظر';
      document.getElementById('conn-a').style.color = conn.a ? '#39FF14' : 'rgba(255,255,255,0.3)';
      document.getElementById('conn-b').textContent = conn.b ? '✅ متصل' : '⏳ انتظر';
      document.getElementById('conn-b').style.color = conn.b ? '#39FF14' : 'rgba(255,255,255,0.3)';
      return;
    }

    // Both connected — show ready phase
    if (data.phase === 'waiting') {
      document.getElementById('cat3-qr-phase').style.display = 'none';
      document.getElementById('cat3-ready-phase').style.display = 'flex';
      document.getElementById('conn-a').textContent = '✅ متصل';
      document.getElementById('conn-b').textContent = '✅ متصل';
    }

    // Ready indicators
    if (data.readyA) { document.getElementById('ready-a').textContent = `✅ ${G.teamA}`; document.getElementById('ready-a').style.color = '#39FF14'; }
    if (data.readyB) { document.getElementById('ready-b').textContent = `✅ ${G.teamB}`; document.getElementById('ready-b').style.color = '#39FF14'; }

    // Both ready — start countdown
    if (data.readyA && data.readyB && data.phase === 'ready') {
      fbUpdate(`rooms/${roomId}`, { phase: 'countdown', question: q, questionIndex: qIndex });
    }

    // Countdown
    if (data.phase === 'countdown') {
      document.getElementById('cat3-ready-phase').style.display = 'none';
      document.getElementById('cat3-countdown-phase').style.display = 'flex';
      let n = 3;
      const cdEl = document.getElementById('main-countdown');
      const cd = setInterval(() => {
        n--;
        if (cdEl) cdEl.textContent = n;
        if (n <= 0) {
          clearInterval(cd);
          fbUpdate(`rooms/${roomId}`, { phase: 'bidding' });
        }
      }, 1000);
    }

    // Bidding
    if (data.phase === 'bidding') {
      document.getElementById('cat3-countdown-phase').style.display = 'none';
      document.getElementById('cat3-qr-phase').style.display = 'none';
      document.getElementById('cat3-ready-phase').style.display = 'none';
      document.getElementById('cat3-bidding-phase').style.display = 'flex';

      // Update bid displays
      if (bidA !== undefined) document.getElementById('bid-a').textContent = bidA;
      if (bidB !== undefined) document.getElementById('bid-b').textContent = bidB;

      // Handle countdown
      if (data.bidCountdownEnd && data.lastBidder && data.lastBidder !== cat3LastBidder) {
        cat3LastBidder = data.lastBidder;
        clearInterval(cat3BidCountdownInterval);

        const winnerName = data.lastBidder === 'a' ? G.teamA : G.teamB;
        const waitingName = data.lastBidder === 'a' ? G.teamB : G.teamA;
        const bidVal = data.lastBidder === 'a' ? bidA : bidB;

        // Flash on main screen
        showBidFlash(`${bidVal} 🔥`, data.lastBidder === 'a' ? '#E50158' : '#E2DA51');
        document.getElementById('bid-event-msg').textContent = `🔥 ${winnerName} زايد ${bidVal} — ${waitingName} عندها 10 ثواني للرد!`;

        const numEl = document.getElementById('bid-countdown-num');
        const labelEl = document.getElementById('bid-countdown-label');
        numEl.style.display = 'block';
        labelEl.style.display = 'block';
        labelEl.textContent = `${waitingName} تحتاج ترد`;

        cat3BidCountdownInterval = setInterval(() => {
          const remaining = Math.max(0, Math.ceil((data.bidCountdownEnd - Date.now()) / 1000));
          numEl.textContent = remaining;
          if (remaining <= 0) {
            clearInterval(cat3BidCountdownInterval);
            numEl.style.display = 'none';
            labelEl.style.display = 'none';
            // Winner is last bidder
            if (data.phase === 'bidding') {
              const winner = data.lastBidder;
              const winnerBid = winner === 'a' ? bidA : bidB;
              fbUpdate(`rooms/${roomId}`, {
                phase: 'answering',
                auctionWinner: winner,
                winningBid: winnerBid,
                answerTimerEnd: Date.now() + 60000,
                answers: []
              });
            }
          }
        }, 200);
      }
    }

    // Answering phase
    if (data.phase === 'answering') {
      clearInterval(cat3BidCountdownInterval);
      document.getElementById('cat3-bidding-phase').style.display = 'none';
      document.getElementById('cat3-winner-phase').style.display = 'flex';
      const winner = data.auctionWinner;
      const winnerName = winner === 'a' ? G.teamA : G.teamB;
      const winnerBid = data.winningBid || 1;
      document.getElementById('winner-announce').textContent = `🏆 ${winnerName} ربح المزاد بـ ${winnerBid} أجوبة!`;

      // Show answers and validation
      const answers = data.answers || [];
      const display = document.getElementById('answers-display');
      display.innerHTML = answers.map((a,i) => `
        <div style="padding:10px 16px;border-radius:10px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:8px;
          background:${a.status==='correct'?'rgba(57,255,20,0.1)':a.status==='wrong'?'rgba(255,45,45,0.1)':'rgba(255,255,255,0.05)'};
          border:1.5px solid ${a.status==='correct'?'var(--neon-green)':a.status==='wrong'?'var(--neon-red)':'rgba(255,255,255,0.15)'}">
          <span style="flex:1">${i+1}. ${a.text}</span>
          <span style="font-size:18px">${a.status==='correct'?'✅':a.status==='wrong'?'❌':'🤖⏳'}</span>
        </div>`).join('');

      // Auto-validate pending answers with AI
      const pendingAnswers = answers.filter(a => !a.status || a.status === 'pending');
      if (pendingAnswers.length > 0) {
        autoValidateAnswers(answers, roomId, q, winnerBid, winner, winnerName);
      }

      // After AI — show manual review for each answer (in order)
      const valWrap = document.getElementById('validation-wrap');
      const allValidated = answers.length >= winnerBid && answers.every(a => a.status && a.status !== 'pending');

      if (!allValidated) {
        // Show manual override for first pending
        const pendingIdx = answers.findIndex(a => !a.status || a.status === 'pending');
        if (pendingIdx >= 0) {
          valWrap.style.display = 'flex';
          document.getElementById('current-answer-text').textContent = `"${answers[pendingIdx].text}" — 🤖 جاري التحقق...`;
          document.getElementById('val-correct-btn').textContent = '✅ صح (تجاوز AI)';
          document.getElementById('val-wrong-btn').textContent = '❌ غلط (تجاوز AI)';
          document.getElementById('val-correct-btn').onclick = () => validateCat3(pendingIdx, 'correct', roomId, winnerBid, winner, answers);
          document.getElementById('val-wrong-btn').onclick = () => validateCat3(pendingIdx, 'wrong', roomId, winnerBid, winner, answers);
        }
      } else {
        // All validated — show manual review loop for all answers
        valWrap.style.display = 'flex';
        document.getElementById('val-correct-btn').textContent = '✅ صح';
        document.getElementById('val-wrong-btn').textContent = '❌ غلط';

        // Find first answer that needs human review (show each one)
        const reviewIdx = answers.findIndex((a,i) => a._reviewed !== true);
        if (reviewIdx >= 0 && reviewIdx < answers.length) {
          const ans = answers[reviewIdx];
          document.getElementById('current-answer-text').innerHTML =
            `جواب ${reviewIdx+1}: "${ans.text}" — AI قال: ${ans.status==='correct'?'✅ صح':'❌ غلط'}`;
          document.getElementById('val-correct-btn').onclick = () => {
            answers[reviewIdx]._reviewed = true;
            validateCat3(reviewIdx, 'correct', roomId, winnerBid, winner, answers);
          };
          document.getElementById('val-wrong-btn').onclick = () => {
            answers[reviewIdx]._reviewed = true;
            validateCat3(reviewIdx, 'wrong', roomId, winnerBid, winner, answers);
          };
        } else {
          // All reviewed — show score
          valWrap.style.display = 'none';
          const correct = answers.filter(a => a.status === 'correct').length;
          const scoreEl = document.getElementById('score-result');
          if (scoreEl.style.display === 'none') {
            scoreEl.style.display = 'block';
            scoreEl.style.color = correct >= winnerBid ? 'var(--neon-green)' : 'var(--neon-red)';
            scoreEl.textContent = correct >= winnerBid
              ? `✅ ${winnerName} أجاب ${correct}/${winnerBid} صح — +4 نقاط!`
              : `❌ ${winnerName} أجاب ${correct}/${winnerBid} فقط — -2 نقاط`;
            if (correct >= winnerBid) addScore(winner, 4);
            else addScore(winner, -2);
          }
        }
      }
    }

    // Give up
    if (data.gaveUp) {
      const gaveUpName = data.gaveUp === 'a' ? G.teamA : G.teamB;
      document.getElementById('bid-event-msg').textContent = `🏳️ ${gaveUpName} تخلى!`;
    }
  });

  // Update phase to 'ready' when both connected
  window._fbOnValue(fbRef(db, `rooms/${roomId}/connected`), (snap) => {
    const conn = snap.val() || {};
    if (conn.a && conn.b) {
      import("https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js").then(({ update }) => {
        update(fbRef(db, `rooms/${roomId}`), { phase: 'ready' });
      });
    }
  });
}

// ── AI AUTO-VALIDATION ──
const _validatingSet = new Set();

async function autoValidateAnswers(answers, roomId, question, winnerBid, winner, winnerName) {
  const db = window._fbDb;
  const fbRef = window._fbRef;
  if (!db) return;
  const { get, update } = await import("https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js");

  for (let i = 0; i < answers.length; i++) {
    const ans = answers[i];
    if (ans.status && ans.status !== 'pending') continue;
    const key = `${roomId}_${i}_${ans.text}`;
    if (_validatingSet.has(key)) continue;
    _validatingSet.add(key);

    // Show validating state on UI
    const display = document.getElementById('answers-display');
    if (display) {
      const chips = display.querySelectorAll('div[data-idx]');
    }

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 50,
          system: "أنت محكّم في مسابقة. أجب بكلمة واحدة فقط: صح أو غلط",
          messages: [{
            role: "user",
            content: `السؤال: "${question}"
جواب اللاعب: "${ans.text}"
اقبل المرادفات والإجابات بالعربي أو الإنجليزي. صح أو غلط؟`
          }]
        })
      });

      if (!response.ok) {
        _validatingSet.delete(key);
        continue;
      }

      const data = await response.json();
      const result = (data.content?.[0]?.text || '').trim();
      const status = result.includes('صح') ? 'correct' : 'wrong';

      // Update Firebase
      const snap = await get(fbRef(db, `rooms/${roomId}/answers`));
      const freshAnswers = snap.val() || [];
      if (freshAnswers[i] && (!freshAnswers[i].status || freshAnswers[i].status === 'pending')) {
        freshAnswers[i] = { text: ans.text, status };
        await update(fbRef(db, `rooms/${roomId}`), { answers: freshAnswers });
      }
    } catch(e) {
      _validatingSet.delete(key);
    }
  }
}

async function validateCat3(idx, status, roomId, winnerBid, winner, currentAnswers) {
  const db = window._fbDb;
  const fbRef = window._fbRef;
  if (!db) return;
  const { get, update } = await import("https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js");
  const snap = await get(fbRef(db, `rooms/${roomId}/answers`));
  const answers = snap.val() || currentAnswers;
  answers[idx] = { ...answers[idx], status };
  await update(fbRef(db, `rooms/${roomId}`), { answers });
}

  if (!G.wcSession || G.wcSession.length === 0) {

function pickWildcard(team, cardIndex) {
  const card = G.wcSession[cardIndex];
  if (!card) return;

  const earned = { q: card.q, a: card.a, used: false };
  if (team === 'a') {
    G.earnedWCA.push(earned);
    G.wcMilestoneA = Math.floor(G.scoreA / 50);
  } else {
    G.earnedWCB.push(earned);
    G.wcMilestoneB = Math.floor(G.scoreB / 50);
  }

  // Remove from shared pool
  G.wcSession.splice(cardIndex, 1);

  // Remove popup
  const popup = document.getElementById('wc-popup');
  if (popup) popup.remove();

  // Show reveal screen for 3 seconds then return to menu
  const teamName = team === 'a' ? G.teamA : G.teamB;

function announceWinner() {
  const winnerName = G.scoreA > G.scoreB ? G.teamA : G.scoreB > G.scoreA ? G.teamB : null;
  const isTie = !winnerName;
  const msg = isTie ? '🤝 تعادل!' : `🏆 الفائز هو ${winnerName}!`;

  // Play winner song
  let winnerAudio = null;
  if (G.winnerSongUrl) {
    winnerAudio = new Audio(G.winnerSongUrl);
    winnerAudio.volume = 0.8;
    winnerAudio.play().catch(() => {});
  }

  const overlay = document.createElement('div');
  overlay.id = 'winner-overlay';
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:9999;
    background:rgba(0,5,30,0.93);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:20px;padding:32px;
    opacity:0;transition:opacity 0.5s;
    overflow:hidden;
  `;

  overlay.innerHTML = `
    <div id="winner-text" style="
      font-family:'Cairo',sans-serif;
      font-size:clamp(40px,9vw,110px);
      font-weight:900;
      color:#39FF14;
      text-shadow:0 0 30px #39FF14,0 0 60px rgba(57,255,20,0.5);
      text-align:center;
      animation:pulse 0.8s infinite;
      line-height:1.2;
    ">${msg}</div>
    <div style="font-size:clamp(16px,2.5vw,24px);color:rgba(255,255,255,0.6);font-family:'Cairo',sans-serif">
      ${isTie ? `${G.scoreA} — ${G.scoreB}` : `${G.scoreA > G.scoreB ? G.scoreA : G.scoreB} نقطة`}
    </div>
    <canvas id="confetti-canvas" style="position:absolute;inset:0;pointer-events:none;width:100%;height:100%"></canvas>
  `;

  document.body.appendChild(overlay);
  requestAnimationFrame(() => overlay.style.opacity = '1');

  // Confetti animation
  const canvas = overlay.querySelector('#confetti-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const pieces = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height - canvas.height,
    w: Math.random() * 12 + 5,
    h: Math.random() * 6 + 4,
    color: ['#FF2D78','#FFE600','#39FF14','#00EFFF','#FF8C00','#FF2D2D'][Math.floor(Math.random()*6)],
    speed: Math.random() * 3 + 1.5,
    angle: Math.random() * 360,
    spin: (Math.random() - 0.5) * 4,
  }));

  let frame;
  function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.y += p.speed;
      p.angle += p.spin;
      if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
    });
    frame = requestAnimationFrame(drawConfetti);
  }
  drawConfetti();

  // Dismiss after 10 seconds
  setTimeout(() => {
    cancelAnimationFrame(frame);
    if (winnerAudio) { winnerAudio.pause(); winnerAudio.currentTime = 0; }
    overlay.style.opacity = '0';
    setTimeout(() => overlay.remove(), 500);
  }, 10000);
}

// ROULETTE
// ══════════════════════════════════════════
let rouletteTarget = null;

function toggleRoulette() {
  const panel = document.getElementById('roulette-panel');
  const isOpen = panel.style.display === 'flex';
  panel.style.display = isOpen ? 'none' : 'flex';
  if (!isOpen) {
    document.getElementById('roulette-result').textContent = '';
    document.getElementById('roulette-go-btn').style.display = 'none';
    document.getElementById('roulette-spin-btn').textContent = '🎰 دوّر!';
    document.getElementById('roulette-spin-btn').disabled = false;
    rouletteTarget = null;
    buildStrip();
  }
}

function openRoulette() { toggleRoulette(); }
function closeRoulette() {
  document.getElementById('roulette-panel').style.display = 'none';
}

function buildStrip() {
  const strip = document.getElementById('roulette-strip');
  const remaining = ROUNDS.filter(r => !G.done.has(r.id));
  if (remaining.length === 0) {
    document.getElementById('roulette-result').textContent = 'كل الفقرات انتهت! 🎉';
    return;
  }
  const items = [];
  for (let i = 0; i < 6; i++) items.push(...remaining);
  strip.innerHTML = items.map(r => `
    <div style="height:32px;display:flex;align-items:center;justify-content:center;
      font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;color:#fff;
      width:100%;flex-shrink:0;padding:0 12px;text-align:center;white-space:nowrap">
      ${r.name}
    </div>
  `).join('');
  strip.style.transition = 'none';
  strip.style.transform = 'translateY(16px)';
}

function spinRoulette() {
  const remaining = ROUNDS.filter(r => !G.done.has(r.id));
  if (remaining.length === 0) {
    document.getElementById('roulette-result').textContent = 'كل الفقرات انتهت! 🎉';
    return;
  }
  const winner = remaining[Math.floor(Math.random() * remaining.length)];
  rouletteTarget = winner;

  const strip = document.getElementById('roulette-strip');
  const itemH = 32;
  const baseOffset = remaining.length * 2;
  const winnerIdx = baseOffset + remaining.findIndex(r => r.id === winner.id);
  const targetY = -(winnerIdx * itemH) + 16;

  strip.style.transition = 'none';
  strip.style.transform = 'translateY(16px)';

  document.getElementById('roulette-result').textContent = '';
  document.getElementById('roulette-go-btn').style.display = 'none';
  document.getElementById('roulette-spin-btn').textContent = '⏳';
  document.getElementById('roulette-spin-btn').disabled = true;

  setTimeout(() => {
    strip.style.transition = 'transform 3s cubic-bezier(0.17, 0.67, 0.12, 1.0)';
    strip.style.transform = `translateY(${targetY}px)`;
  }, 50);

  setTimeout(() => {
    document.getElementById('roulette-result').textContent = `🎯 ${winner.name}`;
    document.getElementById('roulette-go-btn').style.display = 'inline-flex';
    document.getElementById('roulette-spin-btn').textContent = '🎰 دوّر مجدداً';
    document.getElementById('roulette-spin-btn').disabled = false;
  }, 3200);
}

function goToRouletteRound() {
  if (!rouletteTarget) return;
  closeRoulette();
  openRound(rouletteTarget.id);
}

// ══════════════════════════════════════════
// QUESTION HELPERS — handle {q,a} objects from Excel
// ══════════════════════════════════════════
function getQ(item) {
  if (!item) return '';
  if (typeof item === 'string') return item.includes('|') ? item.split('|')[0].trim() : item;
  return item.q || '';
}
function getA(item) {
  if (!item) return '';
  if (typeof item === 'string') return item.includes('|') ? (item.split('|')[1]||'').trim() : '';
  return item.a || '';
}

// Dynamic font size — 23px average, scales down for long text, up for short
function dynFont(text) {
  const len = (text || '').length;
  const isTV = window.innerWidth >= 2560;
  const scale = isTV ? 1.5 : 1;
  if (len <= 20)  return Math.round(44 * scale) + 'px';
  if (len <= 40)  return Math.round(36 * scale) + 'px';
  if (len <= 70)  return Math.round(30 * scale) + 'px';
  if (len <= 100) return Math.round(25 * scale) + 'px';
  if (len <= 140) return Math.round(21 * scale) + 'px';
  return Math.round(18 * scale) + 'px';
}

// ── FORCE FULL HEIGHT when embedded in Squarespace ──
function fixHeight() {
  const vh = window.innerHeight;
  document.documentElement.style.setProperty('--real-vh', vh + 'px');
  document.querySelectorAll('.screen').forEach(s => {
    s.style.height = vh + 'px';
  });
}
window.addEventListener('resize', fixHeight);
window.addEventListener('orientationchange', fixHeight);
fixHeight();

// ── AUTO LOAD ON STARTUP ──
function setLoadProgress(pct) {
  const bar = document.getElementById('loading-bar');
  if (bar) bar.style.width = pct + '%';
}

document.addEventListener('DOMContentLoaded', () => {
  autoLoad();
});

// ══════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
    const screen = document.getElementById('game-screen');
    if(!screen.classList.contains('hidden')) nextQ();
  }
  if(e.key === 'Escape') backToMenu();
  if(e.key === ' ') {
    e.preventDefault();
    const audio = document.getElementById('audio-el');
    if(audio) toggleAudio();
    const video = document.getElementById('video-el');
    if(video) video.paused ? video.play() : video.pause();
  }
});
</script>
